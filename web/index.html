  palette:'<circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.7 1.6-1.7 0-.4-.2-.8-.4-1.1-.3-.3-.4-.7-.4-1.1a1.6 1.6 0 0 1 1.6-1.6h2c3 0 5.5-2.5 5.5-5.6C22 6 17.5 2 12 2z"/>',
  sofa:'<path d="M20 9V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v3"/><path d="M2 11v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v2H6v-2a2 2 0 0 0-4 0Z"/><path d="M4 18v2"/><path d="M20 18v2"/>',
  plus:'<circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/>',
  copy:'<rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  star:'<path d="m12 2 3 6.3 6.9 1L17 14.1l1.1 6.9L12 17.8 5.9 21 7 14.1 2 9.3l6.9-1z"/>',
  external:'<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
  layers:'<path d="m12.8 2.5 8.7 4.4a1 1 0 0 1 0 1.8l-8.7 4.4a2 2 0 0 1-1.6 0L2.5 8.7a1 1 0 0 1 0-1.8l8.7-4.4a2 2 0 0 1 1.6 0Z"/><path d="m22 12.5-9.2 4.6a2 2 0 0 1-1.6 0L2 12.5"/>',
  route:'<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
  message:'<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
  alert:'<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  grid:'<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>',
  sparkle:'<path d="M9.9 2.6 8.4 6.4 4.6 7.9l3.8 1.5 1.5 3.8 1.5-3.8 3.8-1.5-3.8-1.5zM19 3v4M21 5h-4M18 15v4M20 17h-4"/>',
};
function ic(n){ return `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[n]||''}</svg>`; }
const CHIP_ICONS = ['bag','image','coin','gamepad','palette','sofa'];

function applyLang() {
  _lang = detectLang();
  document.documentElement.lang = _lang === 'zh' ? 'zh-CN' : 'en';
  $('#langZh').className = 'langbtn' + (_lang==='zh'?' active':'');
  $('#langEn').className = 'langbtn' + (_lang==='en'?' active':'');
  $('#eyebrow').textContent = t('eyebrow');
  $('#headline').innerHTML = esc(t('heroPre')) + ' <span class="grad">' + esc(t('heroAccent')) + '</span>';
  $('#lead').textContent = t('lead');
  $('#q').placeholder = t('placeholder');
  $('#btnText').textContent = t('btn');
  $('#btnIcon').innerHTML = ic('arrow-right');
  $('#searchIcon').innerHTML = ic('sparkle');
  $('#loadingText').textContent = t('loading');
  $('#footer').textContent = t('footer');
  $('#submitLink').innerHTML = ic('plus') + `<span>${esc(t('submitLink'))}</span>`;
  $('#smIcon').innerHTML = ic('sparkle');
  $('#smTitle').textContent = t('submitTitle');
  $('#smDesc').textContent = t('submitDesc');
  $('#smUrl').placeholder = t('submitUrlPh');
  $('#smNote').placeholder = t('submitNotePh');
  $('#smClose').textContent = t('submitClose');
  $('#smSubmit').textContent = t('submitBtn');
  const [labels, vals] = [t('chips'), t('chipValues')];
  $('#chips').innerHTML = labels.map((l,i) =>
    `<button class="chip gbtn" onclick="ask('${esc(vals[i])}')">${ic(CHIP_ICONS[i]||'grid')}<span>${esc(l)}</span></button>`).join('');
  paintStats();
}

let _stats = null;
const TYPE_ORDER = ['skill','tool','role','plugin','mcp','workflow'];
function paintStats(){
  const el = $('#hstats'); if(!el) return;
  if(!_stats || !_stats.total){ el.innerHTML=''; return; }
  const bt = _stats.by_type || {};
  let h = `<span class="live"></span><span class="k">${_stats.total.toLocaleString()}</span><span>${esc(t('statsResources'))}</span><span class="sep"></span>`;
  h += TYPE_ORDER.filter(ty=>bt[ty]).map(ty=>`<span class="g"><span class="k">${bt[ty].toLocaleString()}</span> ${esc(tt(ty))}</span>`).join('<span class="sep"></span>');
  if(_stats.prompts) h += `<span class="sep"></span><span class="g"><span class="k">${_stats.prompts.toLocaleString()}</span> ${esc(t('statsPrompts'))}</span>`;
  el.innerHTML = h;
}
function loadStats(){
  fetch('/api/stats').then(r=>r.json()).then(d=>{ if(d&&d.total){ _stats=d; paintStats(); } }).catch(()=>{});
}

function openSubmit(){ $('#smMsg').textContent=''; $('#smMsg').className='modalmsg'; $('#submitModal').classList.add('on'); $('#smUrl').focus(); }
function closeSubmit(){ $('#submitModal').classList.remove('on'); }
async function doSubmit(){
  const url = $('#smUrl').value.trim();
  if(url.length < 5){ $('#smUrl').focus(); return; }
  const btn = $('#smSubmit'); btn.disabled = true; btn.textContent = t('submitting');
  const msg = $('#smMsg'); msg.className='modalmsg'; msg.textContent='';
  try{
    const r = await fetch('/api/submit', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url, note: $('#smNote').value.trim()})});
    const d = await r.json();
    if(!r.ok || !d.ok) throw new Error();
    msg.className='modalmsg ok'; msg.textContent = d.duplicate ? t('submitDup') : t('submitOk');
    $('#smUrl').value=''; $('#smNote').value=''; setTimeout(closeSubmit, 1600);
  }catch(e){ msg.className='modalmsg err'; msg.textContent = t('submitErr'); }
  finally{ btn.disabled=false; btn.textContent=t('submitBtn'); }
}

function ask(q){ $('#q').value = q; go(); }

async function go(){
  const q = $('#q').value.trim();
  if(q.length < 2) return;
  $('#btn').disabled = true; $('#loading').style.display='flex'; $('#result').innerHTML='';
  try{
    const r = await fetch(`/api/recommend?lang=${_lang}`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    $('#result').innerHTML = `<div class="answer warn">${esc(t('serverError'))} (${esc(e.message)})</div>`;
  }finally{ $('#btn').disabled = false; $('#loading').style.display='none'; }
}

function cmdBlock(cmd){
  if(!cmd) return '';
  const b64 = btoa(unescape(encodeURIComponent(cmd)));
  return `<div class="cmdrow"><code class="cmd">${esc(cmd)}</code>
    <button class="copy gbtn" onclick="copyCmd(this,'${b64}')">${ic('copy')}<span>${t('copy')}</span></button></div>`;
}
function copyCmd(btn,b64){
  navigator.clipboard.writeText(decodeURIComponent(escape(atob(b64))))
    .then(()=>{ btn.innerHTML = ic('check')+`<span>${t('copied')}</span>`; setTimeout(()=>btn.innerHTML = ic('copy')+`<span>${t('copy')}</span>`, 1500); });
}

function compCard(c){
  const stars = c.stars ? `${ic('star')} ${c.stars>=1000?(c.stars/1000).toFixed(1)+'k':c.stars}` : '';
  const diff = td(c.difficulty || '');
  const opt = c.optional ? t('badgeOptional') : '';
  const notes = c.install && c.install.notes_zh;
  const firstPrompt = c.usage && c.usage.first_prompt_zh;
  const verify = c.usage && c.usage.verify_zh;
  const sec = c.security_notes;
  let h = `<div class="card">
    <div class="head"><span class="badge b-${esc(c.type||'')}">${esc(tt(c.type||''))}</span>
      <span class="name">${esc(c.name)}${opt}</span>
      ${(stars||diff)?`<span class="meta">${stars}${stars&&diff?' · ':''}${diff?esc(diff):''}</span>`:''}</div>`;
  if(c.reason) h += `<div class="reason">${ic('corner-right')}<span>${esc(c.reason)}</span></div>`;
  h += `<div class="desc">${esc(c.description)}</div>`;
  if(c.install && c.install.command) h += cmdBlock(c.install.command);
  if(notes) h += `<div class="note"><b>${t('installNote')}</b>${esc(notes)}</div>`;
  if(c.config_required && c.config_required.length) h += `<div class="note"><b>${t('needPrepare')}</b>${esc(c.config_required.join(', '))}</div>`;
  if(firstPrompt) h += `<div class="note"><b>${t('firstPrompt')}</b></div>` + cmdBlock(firstPrompt);
  if(verify) h += `<div class="note"><b>${t('verify')}</b>${esc(verify)}</div>`;
  if(sec) h += `<div class="note"><b>${t('security')}</b>${esc(sec)}</div>`;
  const link = (c.source&&(c.source.repo||c.source.url))||'';
  if(link) h += `<div class="src"><a href="${esc(link)}" target="_blank" rel="noopener">${ic('external')}<span>${t('sectionSource')}</span></a></div>`;
  return h + `</div>`;
}

function render(d){
  let h = `<div class="answer ${d.intent==='no_result'?'warn':''}">${esc(d.answer)}</div>`;
  if(d.playbook){
    const p = d.playbook;
    h += `<h2 class="sect">${ic('layers')}${t('sectionPlan')}${esc(p.title)}</h2>
      <div class="card"><div class="desc">${esc(p.summary)}</div></div>
      <h2 class="sect">${ic('grid')}${t('sectionComponents')}</h2>` + p.components.map(compCard).join('');
    h += `<h2 class="sect">${ic('route')}${t('sectionSteps')}</h2><div class="card steps">` +
      p.steps.map(s=>`<div class="step"><div class="n"></div>
        <div class="t">${esc(s.title_zh)}</div><div class="d">${esc(s.detail_zh)}</div>
        ${s.command?cmdBlock(s.command):''}</div>`).join('') + `</div>`;
    if(p.first_prompt) h += `<h2 class="sect">${ic('message')}${t('sectionPrompt')}</h2><div class="card">${cmdBlock(p.first_prompt)}</div>`;
    if(p.pitfalls && p.pitfalls.length){
      h += `<h2 class="sect">${ic('alert')}${t('sectionPitfalls')}</h2><div class="card">` +
        p.pitfalls.map(x=>`<div class="pitfall">${ic('alert')}<span>${esc(x)}</span></div>`).join('') + `</div>`;
    }
  }
  if(d.components && d.components.length && !d.playbook){
    h += `<h2 class="sect">${ic('grid')}${t('sectionSingle')}</h2>` + d.components.map(compCard).join('');
  }
  if(d.prompts && d.prompts.length){
    h += `<h2 class="sect">${ic('sparkle')}${t('sectionPrompts')}</h2>` + d.prompts.map(promptCard).join('');
  }
  $('#result').innerHTML = h;
  requestAnimationFrame(()=>{ $('#result').querySelectorAll('.answer, h2.sect, .card').forEach((el,i)=>{
    el.style.animationDelay = Math.min(i*45,450)+'ms'; el.classList.add('rise'); }); });
}

function promptCard(p){
  const tags = (p.scene_tags||[]).concat(p.style_tags||[]).map(x=>`<span class="ptag">${esc(x)}</span>`).join('');
  return `<div class="card">
    <div class="head"><span class="badge b-prompt">PROMPT</span><span class="name">${esc(p.title_zh)}</span></div>
    ${p.summary_zh?`<div class="desc">${esc(p.summary_zh)}</div>`:''}
    <div class="ptags">${tags}</div>${cmdBlock(p.content)}</div>`;
}

// init
applyLang();
loadStats();
(function(){ try{ const p = new URLSearchParams(location.search).get('q'); if(p && p.trim().length>=2){ $('#q').value = p.trim(); go(); } }catch(e){} })();
</script>
</body>
</html>
