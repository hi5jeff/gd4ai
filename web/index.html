<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gd4.ai — AI 工具生态智能推荐</title>
<meta name="description" content="告诉我们你想做什么，我们告诉你需要哪些 AI 工具、怎么装、怎么用。skill / MCP / 插件 / 提示词，一站式方案。">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
         background:#0b1020; color:#e8ecf5; min-height:100vh; }
  .wrap { max-width:820px; margin:0 auto; padding:40px 20px 80px; }
  .logo { font-size:36px; font-weight:800; letter-spacing:-1px; text-align:center;
          background:linear-gradient(120deg,#6ea8ff,#9f7bff,#5eead4);
          -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { text-align:center; color:#9aa7c0; margin:10px 0 28px; font-size:15px; }
  .inputbar { display:flex; gap:10px; }
  .inputbar input { flex:1; padding:14px 18px; font-size:16px; border-radius:12px;
        border:1px solid #2a3a63; background:#121a33; color:#e8ecf5; outline:none; }
  .inputbar input:focus { border-color:#6ea8ff; }
  .inputbar button { padding:14px 28px; font-size:16px; font-weight:600; border:none;
        border-radius:12px; background:linear-gradient(120deg,#6ea8ff,#9f7bff);
        color:#fff; cursor:pointer; }
  .inputbar button:disabled { opacity:.5; cursor:wait; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 8px; justify-content:center; }
  .chip { padding:7px 14px; border-radius:99px; border:1px solid #2a3a63; color:#9aa7c0;
          font-size:13px; cursor:pointer; background:none; }
  .chip:hover { border-color:#6ea8ff; color:#6ea8ff; }
  .loading { text-align:center; padding:40px 0; color:#9aa7c0; display:none; }
  .spinner { width:36px; height:36px; border:3px solid #2a3a63; border-top-color:#6ea8ff;
             border-radius:50%; margin:0 auto 14px; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #result { margin-top:24px; }
  .answer { background:#121a33; border:1px solid #24304f; border-left:4px solid #6ea8ff;
            border-radius:12px; padding:16px 20px; font-size:15px; line-height:1.7; }
  .answer.warn { border-left-color:#f0a35e; }
  h2.sect { font-size:16px; margin:26px 0 12px; color:#c9d4ea; }
  .card { background:#121a33; border:1px solid #24304f; border-radius:12px;
          padding:18px 20px; margin-bottom:14px; }
  .card .head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .card .name { font-size:17px; font-weight:700; }
  .badge { font-size:11px; padding:3px 9px; border-radius:99px; font-weight:600; }
  .b-mcp{background:#173156;color:#6ea8ff} .b-skill{background:#173a2f;color:#5eead4}
  .b-prompt{background:#3a2f17;color:#f0c35e} .b-tool{background:#2b1740;color:#c49aff}
  .b-role{background:#401727;color:#ff8aa8} .b-plugin{background:#173156;color:#6ea8ff}
  .b-workflow{background:#173a2f;color:#5eead4}
  .meta { color:#7c89a6; font-size:12px; margin-left:auto; }
  .reason { color:#5eead4; font-size:13px; margin:8px 0 4px; }
  .desc { color:#9aa7c0; font-size:14px; line-height:1.7; margin:6px 0; }
  .cmdrow { display:flex; align-items:center; gap:8px; margin-top:10px; }
  .cmd { flex:1; background:#0a0f1e; border:1px solid #24304f; border-radius:8px;
         padding:10px 12px; font-family:ui-monospace,Consolas,monospace; font-size:13px;
         color:#5eead4; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
  .copy { padding:8px 14px; font-size:12px; border-radius:8px; border:1px solid #2a3a63;
          background:none; color:#9aa7c0; cursor:pointer; flex-shrink:0; }
  .copy:hover { color:#6ea8ff; border-color:#6ea8ff; }
  .note { color:#7c89a6; font-size:12.5px; margin-top:8px; line-height:1.6; }
  .note b { color:#9aa7c0; }
  .steps { counter-reset:step; }
  .step { display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed #24304f; }
  .step:last-child { border-bottom:none; }
  .step .n { counter-increment:step; flex-shrink:0; width:26px; height:26px; border-radius:50%;
             background:#173156; color:#6ea8ff; font-size:13px; font-weight:700;
             display:flex; align-items:center; justify-content:center; }
  .step .n::before { content:counter(step); }
  .step .t { font-weight:600; font-size:14px; }
  .step .d { color:#9aa7c0; font-size:13px; margin-top:4px; line-height:1.6; }
  .pitfall { color:#f0a35e; font-size:13px; line-height:1.7; padding-left:1.2em; text-indent:-1.2em; }
  .src a { color:#6ea8ff; text-decoration:none; font-size:12.5px; }
  footer { text-align:center; color:#4a5670; font-size:12px; margin-top:60px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">gd4.ai</div>
  <p class="sub">说出你想做什么，给你一套能直接跑通的 AI 工具方案</p>

  <div class="inputbar">
    <input id="q" placeholder="例如：我想做一个电商网站" maxlength="200"
           onkeydown="if(event.key==='Enter')go()">
    <button id="btn" onclick="go()">推荐方案</button>
  </div>
  <div class="chips">
    <button class="chip" onclick="ask('做一个电商网站')">🛒 做电商网站</button>
    <button class="chip" onclick="ask('生成美女人像图的提示词')">📸 人像提示词</button>
    <button class="chip" onclick="ask('省token的方法')">💰 省 Token</button>
    <button class="chip" onclick="ask('游戏开发的动画怎么做')">🎮 游戏动画</button>
    <button class="chip" onclick="ask('设计一张海报')">🎨 平面设计</button>
    <button class="chip" onclick="ask('室内装修效果图')">🏠 室内装修</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    AI 正在从组件库检索并组合方案（约 10~20 秒）…
  </div>
  <div id="result"></div>
  <footer>gd4.ai · 所有推荐均来自人工核实的组件库，命令可直接复制使用</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function ask(q){ $('q').value = q; go(); }

async function go(){
  const q = $('q').value.trim();
  if(q.length < 2) return;
  $('btn').disabled = true; $('loading').style.display='block'; $('result').innerHTML='';
  try{
    const r = await fetch('/api/recommend', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    $('result').innerHTML = `<div class="answer warn">服务暂时不可用（${esc(e.message)}），请稍后重试。</div>`;
  }finally{
    $('btn').disabled = false; $('loading').style.display='none';
  }
}

function cmdBlock(cmd){
  if(!cmd) return '';
  const b64 = btoa(unescape(encodeURIComponent(cmd)));
  return `<div class="cmdrow"><code class="cmd">${esc(cmd)}</code>
    <button class="copy" onclick="copyCmd(this,'${b64}')">复制</button></div>`;
}
function copyCmd(btn,b64){
  navigator.clipboard.writeText(decodeURIComponent(escape(atob(b64))))
    .then(()=>{ btn.textContent='已复制✓'; setTimeout(()=>btn.textContent='复制',1500); });
}

function compCard(c){
  const stars = c.stars ? `⭐ ${c.stars>=1000?(c.stars/1000).toFixed(1)+'k':c.stars}` : '';
  const diff = {beginner:'新手友好',intermediate:'需要动手',advanced:'进阶'}[c.difficulty]||'';
  const opt = c.optional ? '（可选）' : '';
  let h = `<div class="card">
    <div class="head"><span class="badge b-${esc(c.type)}">${esc((c.type||'').toUpperCase())}</span>
      <span class="name">${esc(c.name)}${opt}</span>
      <span class="meta">${stars} ${diff?'· '+diff:''}</span></div>`;
  if(c.reason) h += `<div class="reason">→ ${esc(c.reason)}</div>`;
  h += `<div class="desc">${esc(c.description)}</div>`;
  if(c.install && c.install.command) h += cmdBlock(c.install.command);
  if(c.install && c.install.notes_zh) h += `<div class="note"><b>说明：</b>${esc(c.install.notes_zh)}</div>`;
  if(c.config_required && c.config_required.length)
    h += `<div class="note"><b>需要准备：</b>${esc(c.config_required.join('、'))}</div>`;
  if(c.usage && c.usage.first_prompt_zh)
    h += `<div class="note"><b>第一条提示词：</b></div>` + cmdBlock(c.usage.first_prompt_zh);
  if(c.usage && c.usage.verify_zh) h += `<div class="note"><b>验证：</b>${esc(c.usage.verify_zh)}</div>`;
  if(c.security_notes) h += `<div class="note"><b>⚠ 安全：</b>${esc(c.security_notes)}</div>`;
  const link = (c.source&&(c.source.repo||c.source.url))||'';
  if(link) h += `<div class="note src"><a href="${esc(link)}" target="_blank" rel="noopener">来源 ↗</a></div>`;
  return h + `</div>`;
}

function render(d){
  let h = `<div class="answer ${d.intent==='no_result'?'warn':''}">${esc(d.answer)}</div>`;
  if(d.playbook){
    const p = d.playbook;
    h += `<h2 class="sect">📦 完整方案：${esc(p.title)}</h2>
      <div class="card"><div class="desc">${esc(p.summary)}</div></div>
      <h2 class="sect">🧩 需要的组件</h2>` + p.components.map(compCard).join('');
    h += `<h2 class="sect">🛠 操作步骤</h2><div class="card steps">` +
      p.steps.map(s=>`<div class="step"><div class="n"></div><div style="flex:1">
        <div class="t">${esc(s.title_zh)}</div><div class="d">${esc(s.detail_zh)}</div>
        ${s.command?cmdBlock(s.command):''}</div></div>`).join('') + `</div>`;
    if(p.first_prompt){
      h += `<h2 class="sect">💬 复制这条提示词开始</h2><div class="card">${cmdBlock(p.first_prompt)}</div>`;
    }
    if(p.pitfalls && p.pitfalls.length){
      h += `<h2 class="sect">⚠️ 常见坑</h2><div class="card">` +
        p.pitfalls.map(x=>`<div class="pitfall">• ${esc(x)}</div>`).join('') + `</div>`;
    }
  }
  if(d.components && d.components.length && !d.playbook){
    h += `<h2 class="sect">🧩 推荐组件</h2>` + d.components.map(compCard).join('');
  }
  $('result').innerHTML = h;
}
</script>
</body>
</html>
