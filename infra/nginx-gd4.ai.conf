# gd4.ai — 部署于 root@10.0.0.226 的 /etc/nginx/conf.d/gd4.ai.conf
# 证书: Cloudflare Origin (gd4.ai / *.gd4.ai)，放 /etc/nginx/ssl/
server {
    listen 80;
    listen [::]:80;
    server_name gd4.ai *.gd4.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gd4.ai *.gd4.ai;

    ssl_certificate     /etc/nginx/ssl/gd4.ai.pem;
    ssl_certificate_key /etc/nginx/ssl/gd4.ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/gd4ai;
    index index.html;

    # 前端静态资源
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API → 227（后端服务上线后生效，端口约定 9000）
    location /api/ {
        proxy_pass http://10.0.0.227:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # LLM 推荐接口响应较慢
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
