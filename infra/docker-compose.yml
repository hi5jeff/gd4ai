# howAI 后端基础设施 — 部署于 howairoot@10.0.0.227 的 /opt/howai/
# 所有数据服务只绑 127.0.0.1，不暴露公网。密钥由 provision.sh 生成到同目录 .env。
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: howai-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: howai
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: howai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U howai"]
      interval: 10s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.15
    container_name: howai-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: howai-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  # BGE-M3 embedding 服务（CPU 推理，中英双语；mdbox 无合适文本 embedding 模型）
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: howai-embedding
    restart: unless-stopped
    # max-batch-tokens 必须调小: 默认16384会在4C7G机器上预热时申请8.5GB内存导致OOM
    command: ["--model-id", "BAAI/bge-m3", "--port", "80", "--max-batch-tokens", "1024", "--auto-truncate"]
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - tei_cache:/data

volumes:
  pg_data:
  meili_data:
  redis_data:
  tei_cache:
