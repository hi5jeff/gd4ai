id: pb-token-saving
title_zh: 给 Claude Code 省 Token（降成本）
scenario: token-saving
audience: beginner
host_tool: claude-code
summary_zh: 不装任何东西，用对内置能力就能省 30-60%：上下文管理 + 子代理分流 + 批量指令。
tags: [省token, 成本, 效率]
components:
  - {ref: workflow-token-saving, role_zh: 核心——5 条实操清单直接照做}
  - {ref: plugin-claude-code-templates, role_zh: 可选——社区还有现成的效率命令合集, optional: true}
steps:
  - {title_zh: 管住上下文, detail_zh: 长会话每告一段落就 /compact；换任务直接 /clear 开新会话，别拖着几万 token 的历史聊天}
  - {title_zh: 大活交给子代理, detail_zh: 全库搜索、批量读文件这类高消耗操作说"用 subagent 去做"，主会话只收结论}
  - {title_zh: 写好 CLAUDE.md, detail_zh: 项目结构、技术栈、常用命令写进去，AI 不用每次花 token 重新探索}
  - {title_zh: 需求一次说清, detail_zh: 一条消息列清单批量做，比多轮追问省得多；并要求"只改必要文件"}
first_prompt_zh: 先运行 /cost 看当前消耗，然后按清单逐条调整使用习惯，一周后对比
pitfalls_zh:
  - /compact 会丢失部分细节，重要结论先让 AI 写进文件再压缩
quality: {verified: false}
