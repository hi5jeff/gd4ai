name: Figma Context MCP
description_zh: 把 Figma 设计稿的结构化数据喂给 AI，让 AI 照着设计稿写前端代码，还原度远高于截图。设计转代码的关键一环。
host_tools:
- claude-code
- cursor
- any-mcp-client
categories:
- design-to-code
scenarios:
- web-dev
- graphic-design
tags:
- Figma
- 设计稿
- 前端
difficulty: intermediate
install:
