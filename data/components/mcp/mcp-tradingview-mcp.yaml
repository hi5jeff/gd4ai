name_en: tradingview-mcp
description_en: A TradingView data server based on the Model Context Protocol, providing real-time market data, technical
  indicators, screeners, and backtesting capabilities for AI assistants such as Claude, ChatGPT, and Cursor. Supports global
  exchanges for stocks, cryptocurrencies, forex, and futures, with 30+ built-in technical analysis tools. Can be self-hosted
  or use the hosted version, suitable for AI users who need financial market data and analysis.
