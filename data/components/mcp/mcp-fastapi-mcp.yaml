id: mcp-fastapi-mcp
type: mcp
name: fastapi_mcp
description_zh: FastAPI-MCP 是一个将 FastAPI 端点自动暴露为 MCP（Model Context Protocol）工具的开源库，内置认证支持。它零配置即可使用，能保留请求/响应模型 schema 和 Swagger
  文档，支持挂载到同一 FastAPI 应用或单独部署。适合 FastAPI 开发者快速为 AI 客户端（如 Claude、Cursor）提供 API 接口。
