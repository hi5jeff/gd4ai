  first_prompt_en: Mount my FastAPI application as an MCP server and list all available tools.
name_en: fastapi_mcp
description_en: FastAPI-MCP is an open-source library that automatically exposes FastAPI endpoints as MCP (Model Context Protocol)
  tools, with built-in authentication support. It works with zero configuration, preserves request/response model schemas
  and Swagger documentation, and supports mounting to the same FastAPI application or standalone deployment. It is suitable
  for FastAPI developers to quickly provide API interfaces for AI clients (such as Claude, Cursor).
