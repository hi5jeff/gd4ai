  command: pip install fastapi-mcp
  notes_zh: 需要 Python 3.8+ 环境，推荐使用 uv 包管理器（uv add fastapi-mcp）以获得更快安装速度。
  notes_en: Requires Python 3.8+ environment. It is recommended to use the uv package manager (uv add fastapi-mcp) for faster
    installation.
