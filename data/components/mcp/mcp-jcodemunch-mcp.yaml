id: mcp-jcodemunch-mcp
type: mcp
name: jCodeMunch MCP
description_zh: 基于 tree-sitter AST 的精确 GitHub 代码检索 MCP 服务器，可将 AI 代码探索的 token 消耗降低 95% 以上。支持按函数、类、方法等符号级精准获取代码，避免整文件读取浪费上下文窗口。适合使用
  Claude Code、Cursor 等 MCP 客户端的开发者，已节省超 3350 亿 token。
host_tools:
- claude-code
- cursor
- any-mcp-client
scenarios:
- coding
- devtools
- token-saving
- efficiency
tags:
- ai-coding
- token-saving
- code-retrieval
- tree-sitter
- MCP
- GitHub
difficulty: intermediate
install:
  method: uvx
  command: uvx jcodemunch-mcp
  notes_zh: 需要 Python 环境或 uv 工具，并配置 GitHub Token 以访问仓库。
  notes_en: Requires a Python environment or the uv tool, and a GitHub Token configured to access repositories.
config_required:
- GitHub Token
quality:
  stars: 2005
  last_commit: '2026-07-13'
  verified: false
source:
  repo: https://github.com/jgravelle/jcodemunch-mcp
usage:
  first_prompt_zh: 帮我分析这个 GitHub 仓库的代码结构，列出所有公共函数和类。
  first_prompt_en: Help me analyze the code structure of this GitHub repository and list all public functions and classes.
name_en: jCodeMunch MCP
description_en: A precise GitHub code retrieval MCP server based on tree-sitter AST, reducing AI code exploration token consumption
  by over 95%. It enables symbol-level accurate retrieval of functions, classes, methods, etc., avoiding full-file reads that
  waste context window. Suitable for developers using MCP clients like Claude Code and Cursor, having saved over 335 billion
  tokens.
