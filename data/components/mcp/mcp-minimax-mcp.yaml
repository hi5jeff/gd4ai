  first_prompt_en: Help me generate a picture of a sunset beach with soothing background music.
name_en: MiniMax-MCP
description_en: MiniMax official MCP server, providing AI capabilities such as text-to-speech, image generation, and video
  generation through the Model Context Protocol (MCP). Users can directly call MiniMax's multimodal API in MCP-supported clients
  to quickly create images, videos, and speech from text. Suitable for developers who need to integrate AI generation features,
  especially for content creation, media production, and automated workflow scenarios.
