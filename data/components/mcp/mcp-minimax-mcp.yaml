id: mcp-minimax-mcp
type: mcp
name: MiniMax-MCP
description_zh: MiniMax官方MCP服务器，通过模型上下文协议（MCP）提供文本转语音、图像生成和视频生成等AI能力。用户可在支持MCP的客户端中直接调用MiniMax的多模态API，实现从文字到图像、视频、语音的快速创作。适合需要集成AI生成功能的开发者，尤其适用于内容创作、媒体制作和自动化工作流场景。
