description_en: AnySearch MCP Server is a unified real-time search MCP server that supports general web search, vertical domain
  search (finance, academic, security, legal, code, etc.), parallel batch search, and full URL content extraction to Markdown.
  It can be used anonymously without an API key (rate-limited), suitable for AI agents to quickly integrate search capabilities,
  and also for developers to build intelligent search applications.
