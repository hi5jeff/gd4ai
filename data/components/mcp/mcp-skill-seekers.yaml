id: mcp-skill-seekers
type: mcp
name: Skill Seekers
description_zh: Skill Seekers 是一个将文档网站、GitHub 仓库、PDF、视频、笔记本等 10 多种来源转换为结构化知识资产的工具，支持自动冲突检测。它能为 Claude、Gemini、OpenAI 等 AI 系统生成技能，也可用于
  RAG 管道和 AI 编码助手。适合需要快速从文档中提取知识并集成到 AI 工作流的开发者。
