  verified: false
source:
  repo: https://github.com/apify/apify-mcp-server
usage:
  first_prompt_zh: 帮我从Twitter上抓取最近关于人工智能的热门推文。
  first_prompt_en: Help me scrape recent popular tweets about artificial intelligence from Twitter.
name_en: apify-mcp-server
description_en: Apify MCP Server is a tool based on the Model Context Protocol (MCP) that allows AI agents to extract structured
  data from any web page, including social media, search engines, maps, e-commerce sites, and more, using thousands of ready-made
  crawlers and automation tools. It supports OAuth authentication and seamlessly integrates with MCP clients such as Claude
  Code, Claude.ai, Cursor, and VS Code. Suitable for AI developers, data scientists, and automation engineers who need large-scale
  web data collection.
