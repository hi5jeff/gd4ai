id: mcp-apify-mcp-server
type: mcp
name: apify-mcp-server
description_zh: Apify MCP服务器是一个基于模型上下文协议（MCP）的工具，允许AI代理通过数千个现成的爬虫和自动化工具，从社交媒体、搜索引擎、地图、电商网站等任意网页中提取结构化数据。支持OAuth认证，可无缝集成Claude
  Code、Claude.ai、Cursor、VS Code等MCP客户端。适合需要大规模网页数据采集的AI开发者、数据科学家和自动化工程师。
host_tools:
- claude-code
- cursor
- any-mcp-client
scenarios:
- scraping
- automation
- data-analysis
- search
tags:
- web-scraping
- data-extraction
- mcp-server
- ai-agents
- automation
difficulty: intermediate
install:
  method: manual
  notes_zh: 需要Node.js环境，可通过npm全局安装或使用npx运行；推荐直接连接托管版本（https://mcp.apify.com）免安装。
  notes_en: Requires Node.js environment. Can be installed globally via npm or run using npx. It is recommended to directly
    connect to the hosted version (https://mcp.apify.com) to avoid installation.
config_required:
- Apify API token 或 OAuth 认证
quality:
  stars: 1876
