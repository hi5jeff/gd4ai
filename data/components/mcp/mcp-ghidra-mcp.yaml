name_en: ghidra-mcp
description_en: Ghidra MCP Server is a server based on the Model Context Protocol (MCP) that deeply integrates Ghidra's reverse
  engineering capabilities with AI tools. It provides 256 MCP tools supporting read/write operations, P-code simulation, real-time
  debugging, data flow analysis, batch processing, and more. Suitable for security researchers, reverse engineers, and AI
  developers, it can significantly improve binary analysis efficiency.
