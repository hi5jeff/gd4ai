id: mcp-linkedin-mcp-server
type: mcp
name: linkedin-mcp-server
description_zh: 这是一个开源的MCP服务器，允许Claude等AI助手通过用户已登录的浏览器会话读取LinkedIn数据。它可以访问个人资料、公司信息、职位和消息，适合需要从LinkedIn获取结构化数据的AI代理或开发者。用户需自行提供LinkedIn登录状态，服务器在本地运行，确保数据安全。
host_tools:
