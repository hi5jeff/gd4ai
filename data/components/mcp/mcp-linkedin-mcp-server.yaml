scenarios:
- research
- search
- automation
tags:
- linkedin
- mcp-server
- ai-agents
- social-media
- data-access
difficulty: intermediate
install:
  method: manual
  notes_zh: 需要Python环境，通过pip或uvx安装，但需先获取LinkedIn浏览器cookie并配置环境变量。
  notes_en: Requires Python environment, install via pip or uvx, but you need to first obtain LinkedIn browser cookies and
    configure environment variables.
config_required:
- LinkedIn账号
- 浏览器会话cookie（需手动提取）
quality:
