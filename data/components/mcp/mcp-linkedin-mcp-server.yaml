usage:
  first_prompt_zh: 帮我查看某个LinkedIn用户的个人资料。
  first_prompt_en: Help me view a LinkedIn user's profile.
name_en: linkedin-mcp-server
description_en: This is an open-source MCP server that allows AI assistants like Claude to read LinkedIn data through the
  user's logged-in browser session. It can access profiles, company information, jobs, and messages, making it suitable for
  AI agents or developers who need structured data from LinkedIn. Users need to provide their own LinkedIn login status; the
  server runs locally to ensure data security.
