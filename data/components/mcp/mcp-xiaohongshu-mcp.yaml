id: mcp-xiaohongshu-mcp
type: mcp
name: xiaohongshu-mcp
description_zh: 一个MCP服务器，让AI助手直接访问小红书数据。支持登录、发布图文/视频、搜索内容、获取推荐列表、获取帖子详情（含互动数据和评论）等功能。适合需要在小红书平台进行自动化操作或数据获取的开发者、AI应用集成者。
