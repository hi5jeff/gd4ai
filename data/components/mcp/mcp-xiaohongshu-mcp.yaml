  first_prompt_zh: 帮我搜索小红书上的热门旅游攻略
  first_prompt_en: Help me search for popular travel guides on Xiaohongshu.
name_en: xiaohongshu-mcp
description_en: An MCP server enabling AI assistants to directly access Xiaohongshu data. Features include login, posting
  image-text posts or videos, searching content, retrieving recommendation lists, and fetching post details (including interaction
  data and comments). Ideal for developers and AI application integrators who need automation or data retrieval on the Xiaohongshu
  platform.
