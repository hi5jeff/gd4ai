- MCP服务器
- 数据获取
- 自动化
- 内容发布
difficulty: intermediate
install:
  method: manual
  notes_zh: 可通过Docker部署或使用Openclaw集成，也可选择x-mcp浏览器插件版（零配置）。
  notes_en: Can be deployed via Docker or integrated using Openclaw, or choose the x-mcp browser plugin version (zero configuration).
config_required:
- 小红书登录凭证
quality:
