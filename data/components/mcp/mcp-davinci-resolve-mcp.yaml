usage:
  first_prompt_zh: 帮我创建一个新项目并导入媒体文件
  first_prompt_en: Help me create a new project and import media files.
name_en: davinci-resolve-mcp
description_en: This is an MCP server that enables AI assistants to control DaVinci Resolve Studio via the official scripting
  API. It provides complete API coverage, including editing, media pool management, render settings, review markers, color
  grading, Fusion, Fairlight, project lifecycle, and more. Suitable for video editors, post-production teams, and AI developers,
  it can significantly improve the automation efficiency of video production.
