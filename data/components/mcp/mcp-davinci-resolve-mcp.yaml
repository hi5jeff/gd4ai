id: mcp-davinci-resolve-mcp
type: mcp
name: davinci-resolve-mcp
description_zh: 这是一个MCP服务器，让AI助手通过官方脚本API控制DaVinci Resolve Studio。提供完整的API覆盖，包括编辑、媒体池管理、渲染设置、审阅标记、调色、Fusion、Fairlight、项目生命周期等。适合视频编辑人员、后期制作团队和AI开发者使用，可大幅提升视频制作自动化效率。
host_tools:
- claude-code
- cursor
- windsurf
scenarios:
- media
- automation
- efficiency
tags:
- davinci-resolve
- mcp-server
- video-editing
- automation
- blackmagic
difficulty: intermediate
install:
  method: npx
  command: npx davinci-resolve-mcp setup
  notes_zh: 需要Node.js和Python 3.10+，并确保DaVinci Resolve Studio已打开且设置Preferences > General > External scripting using为Local。
  notes_en: Requires Node.js and Python 3.10+, and ensure DaVinci Resolve Studio is open with Preferences > General > External
    scripting using set to Local.
config_required:
- DaVinci Resolve Studio（商业软件）
- Python 3.10+环境
quality:
