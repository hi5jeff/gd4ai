description_zh: 基于MCP协议的学术论文搜索与下载工具，支持从arXiv、PubMed、bioRxiv、Semantic Scholar等20+来源并发检索、去重和PDF下载。提供统一的高层接口和模块化连接器，适合研究人员、AI科学家及需要批量获取学术文献的LLM工作流。遵循免费优先策略，无需API
  key即可使用基础功能。
