name_en: paper-search-mcp
description_en: An academic paper search and download tool based on the MCP protocol, supporting concurrent search, deduplication,
  and PDF download from 20+ sources including arXiv, PubMed, bioRxiv, Semantic Scholar. Provides a unified high-level interface
  and modular connectors, suitable for researchers, AI scientists, and LLM workflows that need to batch acquire academic literature.
  Follows a free-first strategy, basic features available without an API key.
