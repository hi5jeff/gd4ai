  notes_zh: 需要Node.js LTS环境，可通过npx直接运行或全局安装npm包，并配置MCP客户端连接。
  notes_en: Requires Node.js LTS environment. It can be run directly via npx or installed globally as an npm package, and
    then configured to connect with an MCP client.
config_required: []
