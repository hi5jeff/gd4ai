  first_prompt_zh: 帮我打开Chrome并分析当前页面的性能。
  first_prompt_en: Help me open Chrome and analyze the performance of the current page.
name_en: chrome-devtools-mcp
description_en: This is an MCP server that allows AI coding assistants (such as Claude, Cursor, etc.) to directly control
  the browser via Chrome DevTools, enabling automated testing, deep debugging, and performance analysis. It is based on Puppeteer
  and supports network request analysis, screenshots, console message inspection, and other features, making it suitable for
  developers who need browser automation and debugging.
