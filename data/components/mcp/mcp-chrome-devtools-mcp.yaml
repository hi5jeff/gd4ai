id: mcp-chrome-devtools-mcp
type: mcp
name: chrome-devtools-mcp
description_zh: 这是一个MCP服务器，让AI编码助手（如Claude、Cursor等）通过Chrome DevTools直接控制浏览器，实现自动化测试、深度调试和性能分析。它基于Puppeteer，支持网络请求分析、截图、控制台消息检查等功能，适合需要浏览器自动化与调试的开发者使用。
