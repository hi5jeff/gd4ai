usage:
  first_prompt_zh: 帮我查询npm上最新版本的express包信息
  first_prompt_en: Help me query the latest version of the express package on npm.
name_en: brightdata-mcp
description_en: A server based on the Model Context Protocol that provides AI assistants with real-time web access capabilities,
  automatically bypassing anti-scraping measures, rate limits, and CAPTCHAs. Supports npm/PyPI package data queries, GEO brand
  visibility analysis (directly query ChatGPT/Grok/Perplexity for brand evaluations). Built-in free quota (5,000 credits per
  month), suitable for AI developers, data scraping engineers, and SEO professionals who need real-time web data.
