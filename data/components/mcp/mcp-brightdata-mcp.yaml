id: mcp-brightdata-mcp
type: mcp
name: brightdata-mcp
description_zh: 基于Model Context Protocol的服务器，为AI助手提供实时网页访问能力，自动绕过反爬、限速和验证码。支持npm/PyPI包数据查询、GEO品牌可见性分析（直接查询ChatGPT/Grok/Perplexity对品牌的评价）。内置免费额度（每月5000积分），适合需要实时网络数据的AI开发者、数据采集工程师和SEO优化人员。
