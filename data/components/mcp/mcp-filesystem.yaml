id: mcp-filesystem
type: mcp
name: Filesystem MCP
description_zh: 官方文件系统 MCP，让 AI 读写指定目录下的文件。给不带文件能力的 MCP 客户端（如 Claude Desktop）补上文件操作。
host_tools:
- any-mcp-client
- desktop
categories:
- file-management
scenarios:
- automation
- office
tags:
- 文件
- 官方
difficulty: beginner
install:
  method: claude-mcp-add
  command: claude mcp add filesystem -- npx -y @modelcontextprotocol/server-filesystem ~/Documents
  notes_zh: 最后的路径参数是允许访问的目录，可写多个；只授权需要的目录
  notes_en: The final path parameter is the directory allowed for access; multiple can be specified. Only authorize the directories
    you need.
config_required:
- 允许访问的目录路径
usage:
  first_prompt_zh: 列出我 Documents 目录下的所有文件
  first_prompt_en: List all files in my Documents directory.
quality:
  verified: false
  security_notes_zh: 只能访问显式授权的目录，建议最小化授权范围
  stars: 88433
  last_commit: '2026-07-10'
  security_notes_en: Can only access explicitly authorized directories; it is recommended to minimize the scope of authorization.
relations:
  alternatives: []
source:
  repo: https://github.com/modelcontextprotocol/servers
name_en: Filesystem MCP
description_en: Official filesystem MCP that allows AI to read and write files in specified directories. Adds file operations
  to MCP clients that lack file capabilities (e.g., Claude Desktop).
