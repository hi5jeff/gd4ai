name_en: unreal-mcp
description_en: unreal-mcp is a server based on the Model Context Protocol (MCP) that allows AI assistants (such as Cursor,
  Windsurf, Claude Desktop) to directly control Unreal Engine 5 via natural language. It provides capabilities such as Actor
  management, Blueprint development, node graph editing, viewport control, etc., suitable for game developers, level designers,
  and AI automation enthusiasts.
