id: mcp-unreal-mcp
type: mcp
name: unreal-mcp
description_zh: unreal-mcp 是一个基于 Model Context Protocol (MCP) 的服务器，允许 AI 助手（如 Cursor、Windsurf、Claude Desktop）通过自然语言直接控制 Unreal
  Engine 5。它提供 Actor 管理、蓝图开发、节点图编辑、视口控制等能力，适合游戏开发者、关卡设计师和 AI 自动化爱好者使用。
