id: mcp-headroom
type: mcp
name: headroom
description_zh: Headroom 是一个上下文压缩层，专为 AI 代理设计。它能在工具输出、日志、文件、RAG 块和对话历史到达 LLM 之前进行压缩，减少 60-95% 的 token 消耗（JSON 数据）或 15-20%（编码代理），同时保持答案质量。支持作为
  Python/TypeScript 库、独立代理、MCP 服务器使用，并可一键包装 Claude Code、Codex、Cursor 等主流 AI 工具。适合希望降低 token 成本、提升效率的 AI 代理开发者。
