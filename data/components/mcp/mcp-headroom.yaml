usage:
  first_prompt_zh: 请使用 headroom 压缩当前 AI 代理的上下文，减少 token 消耗。
  first_prompt_en: Please use headroom to compress the current AI agent's context and reduce token consumption.
name_en: headroom
description_en: Headroom is a context compression layer designed for AI agents. It compresses tool outputs, logs, files, RAG
  chunks, and conversation history before they reach the LLM, reducing token consumption by 60-95% (JSON data) or 15-20% (coding
  agents) while maintaining answer quality. It can be used as a Python/TypeScript library, standalone agent, MCP server, and
  can wrap mainstream AI tools like Claude Code, Codex, Cursor with one click. Suitable for AI agent developers who want to
  reduce token costs and improve efficiency.
