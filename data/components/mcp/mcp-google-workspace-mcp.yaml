difficulty: intermediate
install:
  method: manual
  notes_zh: 需要Python 3.10+，并通过pip或uvx安装；首次使用需在Google Cloud Console创建项目并启用相关API，配置OAuth凭据。
  notes_en: Requires Python 3.10+ and installation via pip or uvx; for first use, you need to create a project in Google Cloud
    Console, enable the relevant APIs, and configure OAuth credentials.
config_required:
- Google Cloud OAuth 2.0 客户端ID和密钥
- 已启用Google Workspace API的项目
