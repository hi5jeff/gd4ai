name_en: Google Workspace MCP
description_en: This is a full-featured Google Workspace MCP server that supports controlling Gmail, Google Calendar, Docs,
  Sheets, Slides, Forms, Tasks, Contacts, and Chat via natural language. It provides remote OAuth 2.1 multi-user support,
  fine-grained editing tools, and is compatible with all MCP clients and AI assistants. Suitable for individuals or teams
  who need deep integration of Google Workspace with AI tools, especially for centralized enterprise deployment.
