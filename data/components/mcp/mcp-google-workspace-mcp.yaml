id: mcp-google-workspace-mcp
type: mcp
name: Google Workspace MCP
description_zh: 这是一个功能全面的Google Workspace MCP服务器，支持通过自然语言控制Gmail、Google日历、文档、表格、幻灯片、表单、任务、通讯录和Chat等。它提供远程OAuth 2.1多用户支持、细粒度编辑工具，并兼容所有MCP客户端和AI助手。适合需要将Google
  Workspace与AI工具深度集成的个人或团队，尤其适合企业集中部署。
