name: n8n-mcp
description_zh: n8n-MCP是一个模型上下文协议服务器，为AI助手提供n8n工作流自动化平台的全面节点文档、属性和操作访问。它覆盖2150+节点（826核心+1324社区），支持Claude、Cursor等AI工具理解并构建n8n工作流。适合需要利用AI快速搭建自动化工作流的开发者，可大幅提升效率。
