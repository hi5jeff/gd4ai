name_en: n8n-mcp
description_en: n8n-MCP is a Model Context Protocol server that provides AI assistants with comprehensive access to node documentation,
  properties, and operations of the n8n workflow automation platform. It covers over 2,150 nodes (826 core + 1,324 community),
  enabling AI tools like Claude and Cursor to understand and build n8n workflows. Suitable for developers who need to quickly
  set up automated workflows using AI, greatly improving efficiency.
