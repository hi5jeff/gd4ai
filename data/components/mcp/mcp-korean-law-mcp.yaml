name_en: korean-law-mcp
description_en: MCP server based on 42 public APIs from the Korean Ministry of Legislation, providing queries for laws, precedents,
  administrative rules, autonomous regulations, treaties, etc. Supports citation verification (existence + content consistency),
  statute impact graph, automatic time-point comparison, ordinance radar, etc. Suitable for legal AI assistants, Claude Desktop,
  and other MCP clients.
