name_en: zenfeed
description_en: zenfeed is an AI-powered intelligent RSS information hub that combines the functions of an RSS reader and
  a real-time news knowledge base. It uses AI to automatically filter, summarize, and monitor information of interest, supports
  custom trusted data sources, and can be integrated into various AI clients as an MCP Server for RSSHub. It is suitable for
  RSS veterans and AI enthusiasts who want to efficiently obtain high-quality content from the information deluge and combat
  information overload.
