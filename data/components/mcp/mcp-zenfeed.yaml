id: mcp-zenfeed
type: mcp
name: zenfeed
description_zh: zenfeed 是一个基于 AI 的智能 RSS 信息中枢，兼具 RSS 阅读器与实时新闻知识库功能。它利用 AI 自动筛选、总结和监控关注的信息，支持自定义可信数据源，并可作为 RSSHub 的 MCP Server
  集成到各类 AI 客户端中。适合希望从信息洪流中高效获取高质量内容、对抗信息过载的 RSS 老司机和 AI 爱好者。
