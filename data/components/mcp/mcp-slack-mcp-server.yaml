id: mcp-slack-mcp-server
type: mcp
name: Slack MCP Server
description_zh: Slack MCP Server 是一个强大的模型上下文协议（MCP）服务器，专为 Slack 工作区设计。它支持隐身模式（无需权限和机器人安装）和 OAuth 模式，提供频道/线程消息获取、智能历史分页（按日期或数量）、未读消息管理、消息搜索等功能。支持
  Stdio、SSE 和 HTTP 传输，可配置代理，适合需要将 Slack 集成到 AI 助手或自动化工作流中的开发者。
