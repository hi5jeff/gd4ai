name_en: Slack MCP Server
description_en: Slack MCP Server is a powerful Model Context Protocol (MCP) server designed for Slack workspaces. It supports
  stealth mode (no permissions or bot installation required) and OAuth mode, providing features such as channel/thread message
  retrieval, intelligent history pagination (by date or count), unread message management, and message search. It supports
  Stdio, SSE, and HTTP transports, with configurable proxy, making it suitable for developers who need to integrate Slack
  into AI assistants or automated workflows.
