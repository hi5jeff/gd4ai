name_en: codebase-memory-mcp
description_en: High-performance code intelligence MCP server, based on tree-sitter AST analysis for 158 languages, combined
  with hybrid LSP semantic type resolution, indexes codebases into persistent knowledge graphs. Supports millisecond-level
  queries, reduces token consumption by 99%, single static binary with zero dependencies. Suitable for AI coding agents (e.g.,
  Claude Code, Cursor), enabling rapid understanding of code structure, call chains, and cross-service links.
