name_en: Activepieces
description_en: Activepieces is an open-source AI workflow automation platform that provides over 400 MCP servers, supporting
  AI agents and automation processes. Users can create complex workflows through a visual builder, and all components can
  be used as MCP servers for LLM tools such as Claude Desktop, Cursor, Windsurf, etc. It is suitable for both developers and
  non-technical users to quickly implement automation.
