name_en: stealth-browser-mcp
description_en: An MCP-compatible browser automation tool based on nodriver and Chrome DevTools Protocol, capable of bypassing
  anti-bot systems such as Cloudflare and Queue-It. It provides 97 tools, supporting network interception, pixel-level element
  cloning, dynamic hook system, human-like input, etc. Suitable for scenarios requiring undetected browser operations such
  as AI agents, automated testing, data scraping, etc.
