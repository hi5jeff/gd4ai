usage:
  first_prompt_zh: 帮我提取这个网页的内容：https://example.com
  first_prompt_en: 'Help me extract the content of this webpage: https://example.com'
name_en: webclaw
description_en: webclaw is a Rust-based, local-first web content extraction tool that converts any URL into clean Markdown,
  JSON, and other LLM-ready formats. It provides CLI, REST API, and MCP server, supporting AI agents and RAG pipelines. Suitable
  for developers and AI application builders who need to extract structured data from web pages.
