id: mcp-webclaw
type: mcp
name: webclaw
description_zh: webclaw 是一个基于 Rust 的本地优先网页内容提取工具，能将任意 URL 转换为干净的 Markdown、JSON 等 LLM 就绪格式。提供 CLI、REST API 和 MCP 服务器，支持 AI
  代理和 RAG 管道。适合需要从网页提取结构化数据的开发者、AI 应用构建者。
host_tools:
- claude-code
- cursor
- any-mcp-client
scenarios:
- scraping
- data-analysis
- research
tags:
- AI
- 网页抓取
- Markdown
- MCP服务器
- 数据提取
difficulty: beginner
install:
  method: npx
  command: npx create-webclaw
  notes_zh: 运行此命令会自动检测并配置支持的 MCP 客户端（如 Claude Code、Cursor 等）。
  notes_en: Running this command will automatically detect and configure supported MCP clients (such as Claude Code, Cursor,
    etc.).
config_required: []
quality:
  stars: 1729
  last_commit: '2026-07-02'
  verified: false
source:
