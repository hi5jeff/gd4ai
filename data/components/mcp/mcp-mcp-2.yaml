name: Browser MCP
description_zh: Browser MCP 是一个 MCP 服务器与 Chrome 扩展的组合工具，允许 AI 应用（如 VS Code、Claude、Cursor）直接控制你的浏览器。它利用本地浏览器配置文件，保持登录状态，避免机器人检测和验证码，实现快速、私密的浏览器自动化。适合需要让
  AI 代理执行网页操作、数据抓取或自动化测试的开发者。
