name_en: Browser MCP
description_en: Browser MCP is a combination tool of an MCP server and a Chrome extension, allowing AI applications (such
  as VS Code, Claude, Cursor) to directly control your browser. It utilizes local browser profiles to maintain login states,
  avoid bot detection and CAPTCHAs, and achieve fast, private browser automation. Suitable for developers who need AI agents
  to perform web operations, data scraping, or automated testing.
