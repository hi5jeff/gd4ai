name_en: awslabs/mcp
description_en: An open-source collection of MCP servers maintained by AWS Labs, providing dozens of dedicated MCP servers
  for AWS services, covering infrastructure management, AI/ML, data analytics, databases, message queues, cost optimization,
  and more. Developers can use the MCP protocol to let AI assistants directly call AWS APIs for resource creation, querying,
  monitoring, etc. Suitable for AWS developers using MCP clients like Claude Code and Cursor, it can significantly improve
  cloud resource management efficiency.
