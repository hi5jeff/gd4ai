name: awslabs/mcp
description_zh: 由AWS Labs维护的开源MCP服务器集合，提供数十个针对AWS服务的专用MCP服务器，涵盖基础设施管理、AI/ML、数据分析、数据库、消息队列、成本优化等领域。开发者可通过MCP协议让AI助手直接调用AWS
  API，实现资源创建、查询、监控等操作。适合使用Claude Code、Cursor等MCP客户端的AWS开发者，能显著提升云资源管理效率。
