- api
difficulty: beginner
install:
  method: pip
  command: pip install -U ddgs[mcp]
  notes_zh: 需要 Python 3.10+，建议在虚拟环境中安装。
  notes_en: Requires Python 3.10+, recommended to install in a virtual environment.
config_required: []
