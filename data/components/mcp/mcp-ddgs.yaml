usage:
  first_prompt_zh: 帮我搜索关于人工智能的最新新闻。
  first_prompt_en: Help me search for the latest news about artificial intelligence.
name_en: ddgs
description_en: DDGS is a Python meta-search library that aggregates text, image, video, news, and book results from over
  a dozen search engines including Google, Bing, DuckDuckGo, and supports URL content extraction. It provides CLI, FastAPI
  server, and MCP server, making it easy for developers to quickly integrate multi-source search capabilities, suitable for
  data collection, automated search, and building aggregated search applications.
