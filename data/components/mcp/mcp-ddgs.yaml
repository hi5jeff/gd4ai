id: mcp-ddgs
type: mcp
name: ddgs
description_zh: DDGS 是一个 Python 元搜索库，聚合来自 Google、Bing、DuckDuckGo 等十余个搜索引擎的文本、图片、视频、新闻和书籍结果，并支持 URL 内容提取。提供 CLI、FastAPI 服务器和
  MCP 服务器，方便开发者快速集成多源搜索能力，适合数据采集、自动化搜索和构建聚合搜索应用。
host_tools:
- any-mcp-client
