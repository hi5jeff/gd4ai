install:
  method: manual
  notes_zh: 需要 Node.js 环境；可设置 FIRECRAWL_API_KEY 环境变量以解锁全部功能，免费层无需 key 但有限制。
  notes_en: Requires Node.js environment; you can set the FIRECRAWL_API_KEY environment variable to unlock all features. The
    free tier does not require a key but has limitations.
config_required:
- Firecrawl API key (可选)
