id: mcp-firecrawl-mcp-server
type: mcp
name: firecrawl-mcp-server
description_zh: Firecrawl MCP Server 是一个基于 Model Context Protocol 的服务器，为 Claude、Cursor 等 AI 客户端提供强大的网页抓取和搜索能力。支持搜索网页、抓取任意
  URL 为结构化数据、页面交互（点击、导航）、深度研究等功能，并内置自动重试和限流机制。适合需要从实时网页获取干净、结构化上下文信息的开发者和 AI 代理用户。
host_tools:
- cursor
