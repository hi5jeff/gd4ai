  first_prompt_en: Help me scrape this webpage and summarize the key points.
name_en: firecrawl-mcp-server
description_en: Firecrawl MCP Server is a server based on the Model Context Protocol, providing powerful web scraping and
  search capabilities for AI clients such as Claude and Cursor. It supports web search, scraping any URL into structured data,
  page interaction (clicking, navigation), deep research, and other features, with built-in automatic retry and rate limiting.
  Suitable for developers and AI agent users who need to obtain clean, structured contextual information from live web pages.
