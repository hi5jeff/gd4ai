id: mcp-arxiv-mcp-server
type: mcp
name: arxiv-mcp-server
description_zh: 基于Model Context Protocol的服务器，为AI助手提供搜索和访问arXiv论文的能力。支持按日期范围、类别过滤搜索论文，下载并阅读论文全文，本地缓存加速访问，并提供研究提示词模板。适合研究人员、学生和AI开发者快速集成学术论文检索功能。
