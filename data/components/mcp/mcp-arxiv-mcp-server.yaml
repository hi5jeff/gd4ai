  first_prompt_en: Help me search for papers on fine-tuning large language models from the past month.
name_en: arxiv-mcp-server
description_en: A server based on the Model Context Protocol that provides AI assistants with the ability to search and access
  arXiv papers. Supports filtering papers by date range and category, downloading and reading full papers, local caching for
  faster access, and research prompt templates. Suitable for researchers, students, and AI developers to quickly integrate
  academic paper retrieval functionality.
