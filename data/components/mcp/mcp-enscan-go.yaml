  first_prompt_zh: 查询小米公司的ICP备案和APP信息
  first_prompt_en: Query Xiaomi's ICP filing and app information
name_en: ENScan_GO
description_en: A domestic enterprise information collection tool based on various enterprise information APIs. It can query
  and aggregate public data such as ICP filings, apps, mini-programs, WeChat official accounts, Weibo, and public recruitment
  of holding companies with one click. Supports deep query of multi-level subsidiaries, regex filtering, multi-source merge
  export, and provides MCP server mode for easy integration with AI clients. Suitable for red teams and security researchers
  for enterprise asset mapping and information gathering.
