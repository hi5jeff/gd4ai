id: mcp-enscan-go
type: mcp
name: ENScan_GO
description_zh: 基于各大企业信息API的国内企业信息收集工具，可一键查询并聚合导出控股公司ICP备案、APP、小程序、微信公众号、微博、公开招聘等公开数据。支持深度查询多层孙公司、正则过滤、多数据源合并导出，并提供MCP服务器模式，方便与AI客户端联动。适合红队、安全研究人员进行企业资产梳理和信息收集。
host_tools:
- any-mcp-client
