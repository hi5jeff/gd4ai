  notes_zh: 从GitHub Releases下载对应平台的可执行文件，首次运行使用 -v 参数生成配置文件并配置Cookie。
  notes_en: Download the executable for your platform from GitHub Releases. On first run, use the -v parameter to generate
    a configuration file and configure the Cookie.
