id: mcp-unla
type: mcp
name: Unla
description_zh: Unla是一个轻量级MCP网关服务，基于Go开发，可将现有MCP Server和RESTful API零代码转换为MCP协议端点。支持Docker一键部署和内置管理UI，无需修改基础设施。适合需要快速集成MCP协议的个人或团队，尤其适用于将遗留API无缝接入MCP生态。
host_tools:
- claude-code
- cursor
- any-mcp-client
scenarios:
- mcp-dev
- automation
- efficiency
- devtools
tags:
- MCP
- Gateway
- 零代码
- Docker
- Go
- API转换
difficulty: beginner
install:
  method: manual
  notes_zh: 需先设置环境变量 APISERVER_JWT_SECRET_KEY、SUPER_ADMIN_USERNAME、SUPER_ADMIN_PASSWORD，然后执行 Docker 命令。
  notes_en: You need to set the environment variables APISERVER_JWT_SECRET_KEY, SUPER_ADMIN_USERNAME, SUPER_ADMIN_PASSWORD
    first, then execute the Docker command.
config_required:
- APISERVER_JWT_SECRET_KEY
- SUPER_ADMIN_USERNAME
- SUPER_ADMIN_PASSWORD
quality:
  stars: 2169
