usage:
  first_prompt_zh: 将我的RESTful API转换为MCP端点。
  first_prompt_en: Convert my RESTful API to MCP endpoints.
name_en: Unla
description_en: Unla is a lightweight MCP gateway service developed in Go, which can convert existing MCP Servers and RESTful
  APIs into MCP protocol endpoints with zero code. It supports one-click Docker deployment and a built-in management UI, requiring
  no infrastructure modifications. Suitable for individuals or teams needing rapid integration of the MCP protocol, especially
  for seamlessly connecting legacy APIs into the MCP ecosystem.
