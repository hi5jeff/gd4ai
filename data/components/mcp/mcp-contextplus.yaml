name_en: Context+
description_en: Context+ is an MCP server designed for large engineering teams. It transforms massive codebases into searchable
  hierarchical feature maps by combining RAG, Tree-sitter AST, spectral clustering, and Obsidian-style links. It provides
  tools such as semantic code search, structural analysis, change proposals, and memory graphs, helping developers understand,
  navigate, and modify code with 99% accuracy. Suitable for developers who need high-precision code understanding and collaboration.
