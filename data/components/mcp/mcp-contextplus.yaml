name: Context+
description_zh: Context+ 是一个专为大型工程团队设计的 MCP 服务器，通过结合 RAG、Tree-sitter AST、谱聚类和 Obsidian 风格链接，将海量代码库转化为可搜索的分层特征图。它提供语义代码搜索、结构分析、变更提议、记忆图等工具，帮助开发者以
  99% 的准确率理解、导航和修改代码。适合需要高精度代码理解与协作的开发者。
