description_zh: Klavis 是一个 MCP 集成平台，让 AI 代理能够可靠地调用数千个工具。它提供 Strata 智能连接器优化上下文窗口，并内置 100+ 预构建集成（支持 OAuth），适合需要将 AI 代理与各种外部服务（如
  Discord、API 等）无缝对接的开发者。
