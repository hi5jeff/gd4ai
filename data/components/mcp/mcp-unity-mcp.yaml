id: mcp-unity-mcp
type: mcp
name: Unity-MCP
description_zh: Unity-MCP 是一个为 Unity 引擎打造的 AI 开发工具集，提供 MCP 服务器、CLI 和 AI 技能。它允许开发者通过一行代码将任意 C# 方法转化为 AI 可调用的工具，实现完整的 AI 开发与测试循环。支持与
  Claude、Gemini、Copilot、Cursor 等主流 AI 助手免费集成，显著提升 Unity 游戏开发效率。适合 Unity 游戏开发者、AI 集成爱好者及希望加速迭代的团队。
