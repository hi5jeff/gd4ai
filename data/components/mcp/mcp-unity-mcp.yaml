name_en: Unity-MCP
description_en: Unity-MCP is an AI development toolkit built for the Unity engine, providing MCP server, CLI, and AI skills.
  It allows developers to convert any C# method into an AI-callable tool with a single line of code, enabling a complete AI
  development and testing loop. It supports free integration with mainstream AI assistants such as Claude, Gemini, Copilot,
  and Cursor, significantly improving Unity game development efficiency. Suitable for Unity game developers, AI integration
  enthusiasts, and teams looking to accelerate iteration.
