id: mcp-semble
type: mcp
name: semble
description_zh: Semble 是一个为 AI 编码代理设计的快速准确代码搜索库，支持自然语言查询代码片段，比 grep+read 节省约 98% 的 token。它完全在 CPU 上运行，无需 API 密钥或 GPU，提供 MCP
  服务器、CLI 工具和子代理集成，可无缝接入 Claude Code、Codex、Cursor 等代理，帮助开发者高效定位和理解代码。
