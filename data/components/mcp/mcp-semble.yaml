name_en: semble
description_en: Semble is a fast and accurate code search library designed for AI coding agents. It supports natural language
  queries for code snippets, saving approximately 98% of tokens compared to grep+read. It runs entirely on CPU, requires no
  API key or GPU, and provides MCP server, CLI tool, and sub-agent integration for seamless use with agents like Claude Code,
  Codex, and Cursor, helping developers efficiently locate and understand code.
