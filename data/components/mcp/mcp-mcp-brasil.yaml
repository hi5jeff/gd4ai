description_zh: 一个MCP服务器，集成70个巴西公共API，提供533个工具、131个资源和102个提示，覆盖经济、立法、司法、选举、环境、健康、教育、公共安全等15个领域。66个API无需密钥即可使用，4个需免费注册。支持跨API查询、批量执行和智能工具过滤，适合AI代理（如Claude、GPT）快速获取巴西政府数据。
