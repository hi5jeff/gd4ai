name_en: mcp-brasil
description_en: An MCP server that integrates 70 Brazilian public APIs, providing 533 tools, 131 resources, and 102 prompts,
  covering 15 domains including economy, legislation, judiciary, elections, environment, health, education, public safety,
  and more. 66 APIs are available without an API key, while 4 require free registration. It supports cross-API queries, batch
  execution, and smart tool filtering, making it suitable for AI agents (such as Claude, GPT) to quickly obtain Brazilian
  government data.
