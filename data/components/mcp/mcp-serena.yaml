name: Serena
description_zh: Serena 是一个基于 MCP 协议的编码工具包，为 AI 代理提供类似 IDE 的语义代码检索、编辑、重构和调试能力。它操作于符号级别，利用代码的关系结构，使代理在大型复杂代码库中运行更快、更可靠。适合使用
  Claude Code、Codex 等编码代理的开发者，可显著提升跨文件重命名、引用查找等任务的效率。
