name_en: Serena
description_en: Serena is a coding toolkit based on the MCP protocol, providing AI agents with IDE-like semantic code retrieval,
  editing, refactoring, and debugging capabilities. It operates at the symbol level, leveraging the relational structure of
  code, making agents run faster and more reliably in large, complex codebases. Suitable for developers using coding agents
  like Claude Code and Codex, it significantly improves efficiency in tasks such as cross-file renaming and reference lookup.
