id: mcp-metamcp
type: mcp
name: MetaMCP
description_zh: MetaMCP 是一个集 MCP 聚合器、编排器、中间件和网关于一体的 Docker 化工具。它能够将多个 MCP 服务器动态聚合为一个统一的 MCP 服务器，并支持在请求链中插入中间件（如日志、鉴权、限流等）。本身作为
  MCP 服务器运行，可无缝接入任何 MCP 客户端（如 Claude Desktop、Cursor 等），适合需要集中管理多个 MCP 工具、统一接口和增强安全性的开发团队。
