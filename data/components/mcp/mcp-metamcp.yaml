name_en: MetaMCP
description_en: MetaMCP is a Dockerized tool that integrates MCP aggregator, orchestrator, middleware, and gateway. It can
  dynamically aggregate multiple MCP servers into a unified MCP server, and supports inserting middleware (such as logging,
  authentication, rate limiting, etc.) into the request chain. It runs as an MCP server itself and can seamlessly connect
  to any MCP client (such as Claude Desktop, Cursor, etc.), making it suitable for development teams that need to centrally
  manage multiple MCP tools, unify interfaces, and enhance security.
