description_zh: FIRERPA 是一个全栈 Android 设备控制平台，集成了远程桌面（WebRTC/H.264）、UI/OCR/图像匹配自动化、一键 MITM、内置 Frida、代理/VPN/FRP/P2P 网络、MCP/Agent
