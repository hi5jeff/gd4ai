name_en: FIRERPA
description_en: FIRERPA is a full-stack Android device control platform that integrates remote desktop (WebRTC/H.264), UI/OCR/image
  matching automation, one-click MITM, built-in Frida, proxy/VPN/FRP/P2P networking, MCP/Agent, and 160+ APIs. Suitable for
  teams that need to manage Android devices in bulk, perform automated testing, reverse engineering, or AI agent development,
  supporting multi-device clusters and production environment deployment.
