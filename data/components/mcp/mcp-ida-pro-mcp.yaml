id: mcp-ida-pro-mcp
type: mcp
name: ida-pro-mcp
description_zh: IDA Pro MCP 是一个MCP服务器，将IDA Pro逆向工程工具与AI语言模型连接起来，实现AI辅助的二进制分析。它允许用户通过Claude、Codex、Cursor等MCP客户端，利用自然语言指令对二进制文件进行逆向分析、函数重命名、注释添加等操作。适合安全研究人员、逆向工程师和AI爱好者使用。
host_tools:
- any-mcp-client
scenarios:
- security
- research
- coding
tags:
- IDA Pro
- 逆向工程
- AI辅助
- MCP服务器
- 二进制分析
difficulty: advanced
install:
  method: pip
  command: pip install https://github.com/mrexodia/ida-pro-mcp/archive/refs/heads/main.zip
  notes_zh: 需要IDA Pro 8.3+（推荐9）、Python 3.11+，并确保idalib已全局激活（使用idapyswitch切换Python版本）。
  notes_en: Requires IDA Pro 8.3+ (recommended 9), Python 3.11+, and ensure idalib is globally activated (use idapyswitch
    to switch Python versions).
config_required:
- IDA Pro (8.3+)
- Python 3.11+
- MCP客户端（如Claude Code、Codex等）
quality:
  stars: 10089
  last_commit: '2026-07-13'
  verified: false
source:
  repo: https://github.com/mrexodia/ida-pro-mcp
usage:
  first_prompt_zh: 请分析当前IDA Pro中打开的二进制文件，识别主要函数并解释其功能。
  first_prompt_en: Please analyze the binary file currently open in IDA Pro, identify the main functions, and explain their
    functionality.
name_en: ida-pro-mcp
description_en: IDA Pro MCP is an MCP server that connects the IDA Pro reverse engineering tool with AI language models, enabling
  AI-assisted binary analysis. It allows users to perform reverse analysis, function renaming, comment addition, and other
  operations on binary files using natural language instructions through MCP clients such as Claude, Codex, and Cursor. Suitable
  for security researchers, reverse engineers, and AI enthusiasts.
