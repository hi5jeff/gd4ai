  method: manual
  notes_zh: 确保已安装pipx，然后执行该命令安装flights包，安装后通过fli-mcp命令启动MCP服务器。
  notes_en: Make sure pipx is installed, then run this command to install the flights package. After installation, start the
    MCP server using the fli-mcp command.
