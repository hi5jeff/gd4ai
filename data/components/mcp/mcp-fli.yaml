description_zh: 基于Google Flights反向工程API的MCP服务器，提供航班搜索和日期比价功能。支持多机场、舱位、转机次数、航空公司等精细过滤，可返回最便宜日期。适合需要快速集成航班查询的开发者、旅行规划工具或自动化工作流。
