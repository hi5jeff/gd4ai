name_en: fli
description_en: MCP server based on Google Flights reverse-engineered API, providing flight search and date comparison features.
  Supports fine-grained filtering by multiple airports, cabin class, number of stops, airlines, etc., and can return the cheapest
  dates. Suitable for developers, travel planning tools, or automated workflows that need quick integration of flight queries.
