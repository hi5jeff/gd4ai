name_en: jadx-ai-mcp
description_en: jadx-ai-mcp is an MCP server plugin for JADX that enables communication with LLMs (such as Claude) via the
  MCP protocol, enabling automated reverse engineering, vulnerability detection, and code understanding of Android APKs. It
  is suitable for security researchers, reverse engineers, and mobile app developers, allowing them to quickly gain insights
  into APK structure, permissions, code logic, etc., without manual analysis.
