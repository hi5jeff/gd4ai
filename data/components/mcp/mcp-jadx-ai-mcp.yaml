name: jadx-ai-mcp
description_zh: jadx-ai-mcp 是 JADX 的 MCP 服务器插件，允许通过 MCP 协议与 LLM（如 Claude）通信，实现 Android APK 的自动化逆向分析、漏洞检测和代码理解。适合安全研究人员、逆向工程师和移动应用开发者，无需手动分析即可快速获取
  APK 结构、权限、代码逻辑等洞察。
