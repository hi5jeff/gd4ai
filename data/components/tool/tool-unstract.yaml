name: Unstract
description_zh: Unstract 是一个基于 LLM 的非结构化文档结构化工具，支持通过自然语言定义提取 schema，将 PDF、图片、扫描件等文档转换为 JSON 数据。可部署为 API 或集成到 ETL 管道，适用于金融、保险、医疗、KYC/合规等需要批量文档处理的团队。
