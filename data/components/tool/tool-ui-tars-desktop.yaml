description_zh: UI-TARS-desktop 是一个开源的多模态 AI Agent 桌面应用，基于 UI-TARS 模型提供原生 GUI 代理功能。它支持本地和远程计算机操作以及浏览器自动化，能够连接前沿 AI 模型与 Agent
  基础设施，帮助开发者实现类似人类的 GUI 交互、任务自动化执行。适合需要桌面自动化、浏览器控制或构建智能代理的开发者与 AI 爱好者。
