name_en: UI-TARS-desktop
description_en: UI-TARS-desktop is an open-source multimodal AI Agent desktop application that provides native GUI agent capabilities
  based on the UI-TARS model. It supports local and remote computer operations as well as browser automation, enabling connection
  with cutting-edge AI models and Agent infrastructure. It helps developers achieve human-like GUI interaction and automated
  task execution. Suitable for developers and AI enthusiasts who need desktop automation, browser control, or building intelligent
  agents.
