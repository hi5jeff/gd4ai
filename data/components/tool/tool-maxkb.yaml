name_en: MaxKB
description_en: MaxKB is an open-source enterprise-grade agent building platform that integrates Retrieval-Augmented Generation
  (RAG) pipelines, a powerful workflow engine, and MCP tool invocation capabilities. It supports document upload, online crawling,
  automatic text splitting and vectorization, effectively reducing large model hallucinations. It provides visual workflow
  orchestration, enabling zero-code rapid integration with third-party business systems. Suitable for enterprises building
  intelligent customer service, internal knowledge bases, academic research, and other scenarios.
