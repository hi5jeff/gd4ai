description_zh: MaxKB 是一款开源的企业级智能体构建平台，集成检索增强生成（RAG）管道、强大的工作流引擎和 MCP 工具调用能力。支持文档上传、在线爬取、自动文本分割与向量化，有效降低大模型幻觉；提供可视化流程编排，可零代码快速接入第三方业务系统。适合企业构建智能客服、内部知识库、学术研究等场景。
