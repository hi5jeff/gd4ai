id: tool-inspector
type: tool
name: MCPJam Inspector
description_zh: MCPJam Inspector 是一个用于测试、调试和评估 MCP 服务器、MCP 应用及 ChatGPT 应用的开发平台。它提供聊天、检查、调试、评估等功能，支持 JSON-RPC 消息追踪、OAuth 调试、工具/资源/提示词浏览，以及
  CLI 和 SDK 集成。适合 MCP 开发者、AI 应用构建者和质量保障团队使用，可显著加速迭代并捕获回归。
host_tools:
- web
- desktop
scenarios:
- mcp-dev
- devtools
- efficiency
tags:
- mcp
- debugger
- inspector
- evaluation
- testing
- cicd
difficulty: beginner
install:
  method: npx
  command: npx @mcpjam/inspector@latest
  notes_zh: 运行 npx 命令需要 Node.js 20+；也可直接访问托管 Web 应用 app.mcpjam.com，无需安装。
  notes_en: Running npx commands requires Node.js 20+; you can also directly access the hosted web app at app.mcpjam.com without
    installation.
config_required: []
quality:
  stars: 2062
  last_commit: '2026-07-14'
  verified: false
source:
  repo: https://github.com/MCPJam/inspector
usage:
  first_prompt_zh: 帮我调试这个 MCP 服务器
  first_prompt_en: Help me debug this MCP server
name_en: MCPJam Inspector
description_en: MCPJam Inspector is a development platform for testing, debugging, and evaluating MCP servers, MCP applications,
  and ChatGPT applications. It provides features such as chat, inspection, debugging, and evaluation, supporting JSON-RPC
  message tracing, OAuth debugging, browsing of tools/resources/prompts, as well as CLI and SDK integration. Suitable for
  MCP developers, AI application builders, and QA teams, it can significantly accelerate iteration and catch regressions.
