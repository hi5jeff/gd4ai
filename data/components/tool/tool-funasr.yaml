usage:
  first_prompt_zh: 帮我用FunASR转录这段音频文件
  first_prompt_en: Help me transcribe this audio file using FunASR
name_en: FunASR
description_en: FunASR is an industrial-grade end-to-end speech recognition toolkit that supports 50+ languages, speaker diarization,
  emotion detection, and streaming processing, with speeds up to 340 times real-time. It provides an OpenAI-compatible API,
  making it suitable for developers to quickly integrate speech recognition, emotion analysis, and other features into applications.
