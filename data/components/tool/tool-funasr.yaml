id: tool-funasr
type: tool
name: FunASR
description_zh: FunASR 是一个工业级端到端语音识别工具包，支持 50+ 种语言、说话人分离、情感检测和流式处理，速度可达实时 340 倍。提供 OpenAI 兼容 API，适合开发者快速集成语音识别、情感分析等功能到应用中。
host_tools:
- any
scenarios:
- automation
- media
- efficiency
- research
tags:
- ASR
- 语音识别
- 多语言
- 情感识别
- 说话人分离
- 流式处理
difficulty: intermediate
install:
  method: pip
  command: pip install funasr
  notes_zh: 需要先安装 PyTorch 和 torchaudio（`pip install torch torchaudio`），然后执行安装命令。
  notes_en: You need to install PyTorch and torchaudio first (`pip install torch torchaudio`), then run the installation command.
config_required: []
