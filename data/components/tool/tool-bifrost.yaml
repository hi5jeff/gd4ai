name: Bifrost
description_zh: Bifrost 是一款高性能企业级 AI 网关，统一接入 23+ 大模型提供商（OpenAI、Anthropic、AWS Bedrock 等），提供自适应负载均衡、故障转移、语义缓存、护栏等企业级功能。延迟低于
  100 微秒，支持每秒 5000 请求，零配置即可在 1 分钟内部署。适合需要高可用、低延迟 AI 服务的开发者和企业团队。
