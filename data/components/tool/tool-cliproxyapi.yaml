name_en: CLIProxyAPI
description_en: CLIProxyAPI is a proxy server that provides API interfaces compatible with OpenAI, Gemini, Claude, Codex,
  and Grok. Users can locally access multiple AI models (including Kimi, GPT, Claude, Gemini, Grok, etc.) through any compatible
  client (such as OpenAI SDK, Claude Code, etc.), supporting multi-account management and free model calls. Suitable for developers
  who need a unified API entry, multi-model switching, or local deployment.
