id: tool-cliproxyapi
type: tool
name: CLIProxyAPI
description_zh: CLIProxyAPI 是一个代理服务器，提供兼容 OpenAI、Gemini、Claude、Codex 和 Grok 的 API 接口。用户可通过任何兼容客户端（如 OpenAI SDK、Claude Code
  等）本地访问多个 AI 模型（包括 Kimi、GPT、Claude、Gemini、Grok 等），支持多账户管理和免费模型调用。适合需要统一 API 入口、多模型切换或本地部署的开发者。
