name: Carbon
description_zh: Carbon 是一个面向制造业的开源 ERP、MES 和 QMS 系统，专为复杂装配、合同制造和按订单配置生产设计。它提供 API 优先的架构、自定义字段、嵌套 BOM、可追溯性、MRP、配置器、MCP 客户端/服务器、会计等功能，支持通过
  Supabase 和 React 构建可扩展的制造管理平台。适合制造企业、系统集成商和需要灵活定制生产管理方案的团队。
