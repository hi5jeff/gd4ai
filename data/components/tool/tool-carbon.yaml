name_en: Carbon
description_en: Carbon is an open-source ERP, MES, and QMS system for manufacturing, designed for complex assembly, contract
  manufacturing, and configure-to-order production. It offers an API-first architecture, custom fields, nested BOMs, traceability,
  MRP, configurator, MCP client/server, accounting, and more, supporting the building of scalable manufacturing management
  platforms with Supabase and React. Suitable for manufacturing enterprises, system integrators, and teams needing flexible,
  customized production management solutions.
