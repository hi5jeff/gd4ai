name_en: py-xiaozhi
description_en: py-xiaozhi is a lightweight cross-platform multimodal AI interaction framework based on Python asynchronous
  architecture. It supports real-time voice streaming, visual-language tasks, and IoT device control, and integrates the MCP
  protocol. It can be deployed on Windows, macOS, Linux desktops, and ARM embedded platforms (such as Raspberry Pi, Jetson
  Nano). Suitable for developers to quickly build AI assistant applications with voice interaction, visual understanding,
  and hardware control capabilities.
