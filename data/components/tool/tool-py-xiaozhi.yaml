name: py-xiaozhi
description_zh: py-xiaozhi 是一个基于 Python 异步架构的轻量级跨平台多模态 AI 交互框架。它支持实时语音流、视觉语言任务和 IoT 设备控制，并集成了 MCP 协议，可部署于 Windows、macOS、Linux
  桌面及 ARM 嵌入式平台（如树莓派、Jetson Nano）。适合开发者快速构建具备语音交互、视觉理解和硬件控制能力的 AI 助手应用。
