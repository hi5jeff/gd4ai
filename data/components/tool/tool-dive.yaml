id: tool-dive
type: tool
name: Dive
description_zh: Dive 是一款开源的 MCP Host 桌面应用，支持与任何具备函数调用能力的 LLM（如 ChatGPT、Anthropic、Ollama 等）无缝集成。它提供跨平台支持（Windows/macOS/Linux），内置
  MCP 客户端与服务器管理、聊天界面、工具控制、自定义指令、多语言界面（24+ 种语言）以及自动更新等功能。适合 AI 开发者、MCP 生态用户以及需要本地化 AI 助手的人群，可大幅简化 MCP 服务器的部署与交互流程。
