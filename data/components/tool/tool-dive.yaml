  first_prompt_en: Hello, help me connect to an MCP server and perform a web scrape.
name_en: Dive
description_en: Dive is an open-source MCP Host desktop application that seamlessly integrates with any LLM with function
  calling capabilities (such as ChatGPT, Anthropic, Ollama, etc.). It offers cross-platform support (Windows/macOS/Linux),
  built-in MCP client and server management, chat interface, tool control, custom instructions, multilingual interface (24+
  languages), and automatic updates. Suitable for AI developers, MCP ecosystem users, and those who need a localized AI assistant,
  it greatly simplifies the deployment and interaction process of MCP servers.
