name: RuleGo
description_zh: RuleGo 是一个基于 Go 的轻量级、高性能、可嵌入的组件化规则引擎框架。它支持通过规则链动态编排业务逻辑，实现数据过滤、转换、分发、聚合及与多种协议系统集成。适用于低代码、IoT、边缘计算、自动化、工作流等场景，帮助开发者快速构建松耦合、可实时调整的系统。
