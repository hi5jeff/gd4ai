name_en: RuleGo
description_en: RuleGo is a lightweight, high-performance, embeddable component-based rule engine framework built on Go. It
  supports dynamic orchestration of business logic through rule chains, enabling data filtering, transformation, distribution,
  aggregation, and integration with multiple protocol systems. Suitable for low-code, IoT, edge computing, automation, workflow
  and other scenarios, helping developers quickly build loosely coupled, real-time adjustable systems.
