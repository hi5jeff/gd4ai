description_zh: Happy 是 Claude Code 和 Codex 的移动端与 Web 客户端，支持端到端加密、实时语音和推送通知。开发者可通过手机或浏览器远程查看 AI 编码代理的进度、处理权限请求和错误，并能在设备间无缝切换。适合需要随时监控
