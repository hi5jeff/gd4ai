name_en: Happy
description_en: Happy is a mobile and web client for Claude Code and Codex, supporting end-to-end encryption, real-time voice,
  and push notifications. Developers can remotely view the progress of AI coding agents, handle permission requests and errors
  via phone or browser, and seamlessly switch between devices. Suitable for developers who need to monitor AI programming
  tasks anytime, open source and no telemetry.
