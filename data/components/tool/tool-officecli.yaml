description_zh: OfficeCLI 是专为 AI 代理设计的首个 Office 套件，支持读写编辑 Word、Excel、PowerPoint 文件。单二进制，无需安装 Office，内置 HTML 渲染引擎可将文档转为 HTML
  或 PNG，实现“渲染-查看-修正”闭环。适合需要自动化处理 Office 文档的 AI 开发者和智能体。
