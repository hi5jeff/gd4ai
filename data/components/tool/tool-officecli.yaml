name_en: OfficeCLI
description_en: OfficeCLI is the first Office suite designed specifically for AI agents, supporting reading, writing, and
  editing Word, Excel, and PowerPoint files. It is a single binary that requires no Office installation, with a built-in HTML
  rendering engine that can convert documents to HTML or PNG, enabling a 'render-view-correct' loop. Suitable for AI developers
  and agents who need to automate Office document processing.
