name: NanoClaw
description_zh: NanoClaw 是一个轻量级 AI 助手，基于 Anthropic Agents SDK 构建，在容器中安全运行代理。它支持连接 WhatsApp、Telegram、Slack、Discord、Gmail 等消息应用，具备记忆和定时任务功能。代码库小巧易理解，适合需要安全、可定制
  AI 助手的开发者和团队。
