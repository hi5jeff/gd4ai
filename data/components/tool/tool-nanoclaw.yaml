name_en: NanoClaw
description_en: NanoClaw is a lightweight AI assistant built on the Anthropic Agents SDK, running agents securely in containers.
  It supports connecting to messaging apps such as WhatsApp, Telegram, Slack, Discord, and Gmail, with memory and scheduled
  task capabilities. The codebase is small and easy to understand, making it suitable for developers and teams who need a
  secure, customizable AI assistant.
