usage:
  first_prompt_zh: 开始构建我的第一个 MCP 应用
  first_prompt_en: Start building my first MCP app
name_en: mcp-use
description_en: mcp-use is a full-stack MCP framework that provides TypeScript and Python SDKs for quickly building MCP Apps
  (supporting ChatGPT/Claude) and MCP Servers (for AI agents). It includes a built-in online Inspector debugging tool, and
  supports one-click project creation, preview, and deployment to the cloud. Suitable for developers who want to build MCP
  ecosystem applications, lowering the barrier to entry for the MCP protocol.
