name: Chatbox
description_zh: Chatbox 是一款功能强大的 AI 桌面客户端，支持 ChatGPT、Claude、DeepSeek、Gemini 等多种大语言模型。它提供本地优先、隐私安全的聊天体验，界面简洁美观，支持 Windows、Mac、Linux
  全平台。适合需要同时使用多个 AI 模型的开发者、研究人员和日常用户，可高效完成编程辅助、信息查询、文档撰写等任务。
