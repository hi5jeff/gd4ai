name_en: Chatbox
description_en: Chatbox is a powerful AI desktop client that supports multiple large language models such as ChatGPT, Claude,
  DeepSeek, Gemini, etc. It offers a local-first, privacy-secure chat experience with a clean and beautiful interface, supporting
  Windows, Mac, and Linux across all platforms. Suitable for developers, researchers, and everyday users who need to use multiple
  AI models simultaneously, it efficiently handles tasks like programming assistance, information retrieval, document writing,
  and more.
