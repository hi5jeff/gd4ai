name_en: CodexBar
description_en: CodexBar is a macOS menu bar app that displays real-time usage limits, credit balances, and reset countdowns
  for 59+ AI coding services like OpenAI Codex and Claude Code without requiring login. It retrieves data by reusing existing
  sessions (OAuth, API keys, browser cookies, etc.), prioritizing privacy with no background processes. Ideal for developers
  who frequently use AI coding tools and need to plan task timing, helping avoid interruptions due to quota exhaustion.
