name: CodexBar
description_zh: CodexBar是一款macOS菜单栏应用，无需登录即可实时显示OpenAI Codex、Claude Code等59+AI编码服务的用量限制、信用余额和重置倒计时。它通过复用现有会话（OAuth、API密钥、浏览器Cookie等）获取数据，隐私优先，无后台进程。适合频繁使用AI编码工具、需要规划任务时机的开发者，帮助避免因额度耗尽而中断工作。
