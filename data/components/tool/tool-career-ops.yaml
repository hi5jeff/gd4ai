id: tool-career-ops
type: tool
name: Career-Ops
description_zh: Career-Ops 是一个开源 AI 求职系统，可自动扫描多个职位门户，对职位列表进行 A-F 评分，根据职位要求定制简历，并跟踪申请进度。它运行在本地 AI 编码 CLI（如 Claude Code、Gemini、Codex）中，适合求职者高效筛选和申请工作，尤其适合技术岗位求职者。
