usage:
  first_prompt_zh: 开始帮我搜索最新的 AI 相关职位。
  first_prompt_en: Start helping me search for the latest AI-related jobs.
name_en: Career-Ops
description_en: Career-Ops is an open-source AI job search system that automatically scans multiple job portals, rates job
  listings on an A-F scale, tailors resumes based on job requirements, and tracks application progress. It runs in local AI
  coding CLIs (such as Claude Code, Gemini, Codex) and is suitable for job seekers to efficiently filter and apply for jobs,
  especially for technical positions.
