description_zh: Hermes Agent 是一个由 Nous Research 构建的自我改进 AI 代理，具备内置学习循环，能从经验中自动创建技能、跨会话记忆用户偏好，并支持 Telegram、Discord、Slack 等多平台接入。它可运行在低配
