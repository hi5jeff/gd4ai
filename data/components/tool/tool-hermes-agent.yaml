name_en: hermes-agent
description_en: Hermes Agent is a self-improving AI agent built by Nous Research, featuring a built-in learning loop that
  automatically creates skills from experience, remembers user preferences across sessions, and supports multi-platform integration
  such as Telegram, Discord, and Slack. It can run on low-end VPS or GPU clusters, is compatible with multiple model providers
  (e.g., OpenAI, OpenRouter), and is suitable for users who need personalized, continuously evolving AI assistants and automation
  tasks.
