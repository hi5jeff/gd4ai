name: HttpRunner
description_zh: HttpRunner 是一款开源的 API/UI 测试框架，支持 Android、iOS、Harmony 和浏览器多端 UI 自动化，采用纯视觉驱动方案（OCR/CV/VLM），集成大模型技术，提供命令行工具 hrp。它同时支持
  API 测试、性能测试和 UI 自动化，具有插件化机制和高可扩展性，适合测试工程师和开发者快速构建端到端测试场景。
