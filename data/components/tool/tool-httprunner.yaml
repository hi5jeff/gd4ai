name_en: HttpRunner
description_en: HttpRunner is an open-source API/UI testing framework that supports multi-platform UI automation for Android,
  iOS, Harmony, and browsers. It adopts a pure vision-driven approach (OCR/CV/VLM), integrates large model technology, and
  provides a command-line tool hrp. It also supports API testing, performance testing, and UI automation, with a plugin mechanism
  and high extensibility, suitable for test engineers and developers to quickly build end-to-end testing scenarios.
