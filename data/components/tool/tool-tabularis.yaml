description_zh: Tabularis 是一款开源桌面 SQL 工作空间，支持 PostgreSQL、MySQL/MariaDB、SQLite 等 15+ 种数据库，内置 MCP 服务器，可直接与 Claude、Cursor、Devin
  等 AI 工具集成，提供 SQL 笔记本和可视化 EXPLAIN 功能。适合数据库开发者、数据分析师以及需要 AI 辅助数据库查询的用户。
