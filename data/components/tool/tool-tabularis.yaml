name_en: tabularis
description_en: Tabularis is an open-source desktop SQL workspace that supports over 15 databases including PostgreSQL, MySQL/MariaDB,
  and SQLite. It comes with a built-in MCP server for direct integration with AI tools like Claude, Cursor, and Devin, and
  offers SQL notebooks and visual EXPLAIN features. Ideal for database developers, data analysts, and users who need AI-assisted
  database queries.
