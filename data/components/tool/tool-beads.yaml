name_en: beads
description_en: Beads is a command-line tool that provides persistent structured memory for AI coding agents. It replaces
  messy Markdown plans with a dependency-aware graph structure, supporting multi-agent collaboration, version control (based
  on Dolt), task tracking, context compression, and messaging. Suitable for developers using coding agents like Claude Code,
  Codex, etc., it helps agents handle long-cycle tasks without losing context.
