name: beads
description_zh: Beads 是一个为 AI 编码代理提供持久化结构化记忆的命令行工具。它用依赖感知的图结构替代混乱的 Markdown 计划，支持多代理协作、版本控制（基于 Dolt）、任务追踪、上下文压缩和消息传递。适合使用
  Claude Code、Codex 等编码代理的开发者，帮助代理处理长周期任务而不丢失上下文。
