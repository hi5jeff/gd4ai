name_en: Rowboat
description_en: Rowboat is an open-source desktop AI colleague with persistent memory. It automatically indexes your emails,
  meetings, chat logs, and other work content to build a dynamic knowledge graph. It also comes with built-in collaboration
  interfaces such as an email client, browser, notes, code mode, and meeting records, helping knowledge workers efficiently
  manage information, auto-draft replies, and execute background tasks. Suitable for individuals or teams that need AI assistance
  for daily office work and project collaboration.
