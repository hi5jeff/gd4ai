description_zh: Rowboat 是一款开源的桌面 AI 同事，具备持久记忆能力。它能自动索引你的邮件、会议、聊天记录等工作内容，构建动态知识图谱，并内置邮件客户端、浏览器、笔记、代码模式、会议记录等协作界面，帮助知识工作者高效管理信息、自动起草回复、执行后台任务。适合需要
  AI 辅助日常办公与项目协作的个人或团队。
