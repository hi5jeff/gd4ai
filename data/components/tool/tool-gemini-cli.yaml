usage:
  first_prompt_zh: 帮我写一个Python脚本，读取当前目录下的所有CSV文件并合并成一个。
  first_prompt_en: Write a Python script that reads all CSV files in the current directory and merges them into one.
name_en: gemini-cli
description_en: Gemini CLI is an open-source AI agent from Google that brings the capabilities of the Gemini model directly
  to the terminal. It offers a free tier (60 requests/minute, 1000 requests/day), supports the powerful Gemini 3 model, a
  1M context window, and includes built-in tools such as Google Search, file operations, shell commands, and web scraping.
  It can also be extended via the MCP protocol. Suitable for developers and AI enthusiasts to quickly interact with Gemini
  on the command line, improving development efficiency.
