  command: npx @google/gemini-cli
  notes_zh: 需要Node.js环境，使用npx可直接运行，无需全局安装；也可通过npm install -g @google/gemini-cli全局安装。
  notes_en: Requires Node.js environment. Can be run directly with npx without global installation; alternatively, install
    globally via npm install -g @google/gemini-cli.
