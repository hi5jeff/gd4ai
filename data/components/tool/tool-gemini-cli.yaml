name: gemini-cli
description_zh: Gemini CLI 是谷歌推出的开源AI代理，将Gemini模型能力直接带入终端。它提供免费层（60次/分钟，1000次/天），支持强大的Gemini 3模型、1M上下文窗口，内置Google搜索、文件操作、shell命令和网页抓取等工具，并可通过MCP协议扩展。适合开发者和AI爱好者在命令行中快速与Gemini交互，提升开发效率。
