description_zh: LeanCTX是一个本地运行的Rust二进制工具，作为AI代理的上下文智能层。它能控制AI读取的内容、压缩上下文（节省60-90% token）、记忆跨会话信息、保护数据安全，并提供可验证的节省账本。适合使用Claude
  Code等AI编码工具的开发者，零配置即可使用。
