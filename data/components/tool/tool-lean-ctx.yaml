name_en: lean-ctx
description_en: LeanCTX is a locally running Rust binary tool that acts as an intelligent context layer for AI agents. It
  controls what AI reads, compresses context (saving 60-90% tokens), remembers information across sessions, protects data
  security, and provides a verifiable savings ledger. Suitable for developers using AI coding tools like Claude Code, zero
  configuration required.
