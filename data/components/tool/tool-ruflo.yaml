id: tool-ruflo
type: tool
name: ruflo
description_zh: Ruflo 是一个领先的智能体元框架，用于部署多智能体群、协调自主工作流和构建对话式 AI 系统。它具备自适应记忆、自学习智能、RAG 集成，并原生支持 Claude Code、Codex、Hermes 等多种
  AI 工具。适合开发者快速搭建复杂的 AI 代理协作场景。
