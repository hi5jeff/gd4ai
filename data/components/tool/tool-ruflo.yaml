usage:
  first_prompt_zh: 帮我创建一个多智能体工作流，协调三个 AI 代理完成市场调研和报告生成。
  first_prompt_en: Help me create a multi-agent workflow that coordinates three AI agents to conduct market research and generate
    a report.
name_en: ruflo
description_en: Ruflo is a leading meta-framework for deploying multi-agent swarms, orchestrating autonomous workflows, and
  building conversational AI systems. It features adaptive memory, self-learning intelligence, RAG integration, and native
  support for AI tools such as Claude Code, Codex, and Hermes. Ideal for developers quickly building complex AI agent collaboration
  scenarios.
