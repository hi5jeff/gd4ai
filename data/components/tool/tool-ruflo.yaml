difficulty: intermediate
install:
  method: npx
  command: npx ruflo
  notes_zh: 确保已安装 Node.js，直接运行 npx ruflo 即可启动（首次运行会自动下载依赖）。
  notes_en: Make sure Node.js is installed. Simply run npx ruflo to start (dependencies will be downloaded automatically on
    first run).
config_required:
- API密钥（如 OpenAI、Anthropic 等）
