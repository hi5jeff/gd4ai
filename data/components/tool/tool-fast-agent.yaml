id: tool-fast-agent
type: tool
name: fast-agent
description_zh: fast-agent 是一个灵活的 LLM 交互工具，支持编码代理、开发工具包、评估和工作流。它提供 CLI 和交互式终端，原生支持 Anthropic、OpenAI、Google 等多种模型提供商，内置 MCP
  客户端功能，可连接 MCP 服务器、管理技能、支持子代理和智能模式。适合开发者快速构建、测试和评估 AI 代理，尤其适用于编码辅助和自动化任务。
host_tools:
- any
scenarios:
- coding
- devtools
- automation
- research
tags:
- agent-framework
- mcp
- cli
