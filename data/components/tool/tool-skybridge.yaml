name_en: Skybridge
description_en: Skybridge is a full-stack TypeScript framework for building MCP Apps and ChatGPT Apps. It provides a type-safe,
  React-driven development experience and supports MCP clients such as Claude, ChatGPT, and VSCode. With built-in development
  server, local simulator, hot reload, and tunneling features, developers can quickly create MCP applications with interactive
  UIs. It is suitable for frontend or full-stack developers who want to customize interfaces for AI assistants.
