name_en: Viper
description_en: Viper is a powerful red team simulation and adversarial platform, integrating AI-driven LLM Agent and 100+
  post-exploitation modules, covering the full MITRE ATT&CK framework. It provides an intuitive web interface, supports Windows,
  Linux, macOS multi-platform, and features advanced capabilities such as automated workflows, anti-tracking, firewall, defense
  evasion, etc., suitable for red team members and penetration testers to efficiently complete security assessment tasks.
