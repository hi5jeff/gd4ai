description_zh: Solon 是一款 Java 企业级应用开发框架，以高性能、低资源消耗著称，并发能力提升 700%，内存节省 50%，启动速度快 10 倍，打包体积小 90%。支持 Java 8 到 Java 25，兼容 GraalVM
  原生镜像。内置 AOP、IOC 等核心能力，可替代 Spring 框架，适合构建微服务、Web 应用等场景。适合 Java 开发者快速搭建高效、轻量的企业应用。
