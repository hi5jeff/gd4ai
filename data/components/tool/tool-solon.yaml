name_en: Solon
description_en: Solon is a Java enterprise application development framework known for high performance and low resource consumption,
  with a 700% increase in concurrency, 50% memory savings, 10x faster startup, and 90% smaller package size. It supports Java
  8 through Java 25 and is compatible with GraalVM native images. Built-in core capabilities such as AOP and IOC can replace
  the Spring framework, making it suitable for building microservices, web applications, and more. Ideal for Java developers
  to quickly build efficient, lightweight enterprise applications.
