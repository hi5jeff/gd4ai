name_en: herdr
description_en: herdr is an agent multiplexer running in the terminal, allowing you to view, manage, and switch between multiple
  AI agents (such as Claude Code, Codex, etc.) in a single view. It supports detachable sessions, persistent operation, both
  keyboard and mouse interaction, and plugin extensions, making it suitable for developers who need to use multiple coding
  agents in parallel.
