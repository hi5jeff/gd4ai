name_en: Agent Teams AI
description_en: Agent Teams AI is a desktop application that lets you act as a manager, with AI agents as team members automatically
  handling tasks, communicating with each other, and reviewing work. Supports 200+ models and 75+ LLM providers (including
  Claude, Codex, Grok, Cursor, etc.), and provides a kanban view for issuing advanced instructions. Suitable for developers
  and project managers to efficiently coordinate multi-agent collaboration, ready to use without programming.
