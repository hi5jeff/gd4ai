name: CowAgent
description_zh: CowAgent 是一个开源的超级 AI 助手与 Agent 框架，能够主动规划任务、控制电脑和外部服务、创建并运行技能、构建个人知识库与长期记忆，并通过自我进化不断成长。它支持多种大模型和通信渠道（网页、微信、飞书等），轻量易部署，一行命令即可安装。适合希望拥有个性化
  AI 助手、自动化工作流和持续学习能力的开发者和高级用户。
