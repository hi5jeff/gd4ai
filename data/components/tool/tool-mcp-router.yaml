name_en: MCP Router
description_en: MCP Router is a cross-platform desktop application for unified management of multiple MCP servers. It supports
  local and remote server connections, and provides organizational features such as project grouping, workspace management,
  and tool toggling. All data is stored locally to ensure privacy and security. It is suitable for developers or teams who
  need to centrally manage multiple MCP services.
