name: MCP Router
description_zh: MCP Router 是一款跨平台桌面应用，用于统一管理多个 MCP 服务器。它支持本地和远程服务器连接，提供项目分组、工作区管理、工具开关等组织功能，所有数据本地存储，保障隐私安全。适合需要集中管理多个 MCP
  服务的开发者或团队。
