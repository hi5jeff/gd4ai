name: PaperDebugger
description_zh: PaperDebugger 是一款基于插件的多智能体学术写作助手，集成于 Overleaf 编辑器内，提供 AI 驱动的论文调试、审阅和修订建议。它模拟完整的学术工作流（研究→批评→修订），支持多步推理、审稿人风格批评和结构化修改，帮助研究人员和学者在不离开编辑器的情况下提升论文质量。
