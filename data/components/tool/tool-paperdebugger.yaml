name_en: PaperDebugger
description_en: PaperDebugger is a plugin-based multi-agent academic writing assistant integrated into the Overleaf editor,
  providing AI-driven paper debugging, review, and revision suggestions. It simulates the complete academic workflow (research
  → critique → revision), supports multi-step reasoning, reviewer-style criticism, and structured modifications, helping researchers
  and scholars improve paper quality without leaving the editor.
