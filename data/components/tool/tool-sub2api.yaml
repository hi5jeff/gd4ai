difficulty: intermediate
install:
  method: manual
  notes_zh: 需要 Docker 或 Go 1.25+ 环境，并配置 PostgreSQL 15+ 和 Redis 7+ 数据库。
  notes_en: Requires Docker or Go 1.25+ environment, and configured PostgreSQL 15+ and Redis 7+ databases.
config_required:
- 上游 AI 服务 API Key（如 Claude、OpenAI 等）
- PostgreSQL 连接信息
- Redis 连接信息
