id: tool-sub2api
type: tool
name: sub2api
description_zh: Sub2API 是一个开源的一站式 AI API 网关平台，支持将 Claude、OpenAI、Gemini、Grok 等多个订阅统一接入，并提供拼车共享功能，帮助用户高效分摊成本。它原生兼容 Claude Code、Codex
  等主流工具，无需额外适配即可无缝使用。适合需要管理多个 AI 订阅、降低使用成本或实现团队共享的个人开发者及小型团队。
host_tools:
- web
- claude-code
- codex
