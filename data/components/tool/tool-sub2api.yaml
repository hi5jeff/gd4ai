usage:
  first_prompt_zh: 帮我配置一个 Claude 订阅的中转端点。
  first_prompt_en: Help me configure a relay endpoint for a Claude subscription.
name_en: sub2api
description_en: Sub2API is an open-source, all-in-one AI API gateway platform that supports unified access to multiple subscriptions
  such as Claude, OpenAI, Gemini, and Grok, and offers carpool sharing features to help users efficiently split costs. It
  is natively compatible with mainstream tools like Claude Code and Codex, requiring no additional adaptation for seamless
  use. It is suitable for individual developers and small teams who need to manage multiple AI subscriptions, reduce usage
  costs, or achieve team sharing.
