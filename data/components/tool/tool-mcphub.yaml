id: tool-mcphub
type: tool
name: MCPHub
description_zh: MCPHub 是一个集中管理和动态编排多个 MCP 服务器的统一枢纽。它通过灵活的 HTTP/SSE 端点，让用户能够访问所有服务器、单个服务器或逻辑分组，并支持智能路由、OAuth 认证、热更新配置、工具结果压缩等功能。适合需要高效管理多个
  MCP 服务的开发者或团队。
host_tools:
- web
- any-mcp-client
scenarios:
- devtools
- automation
- efficiency
- monitoring
tags:
