  notes_zh: 需要先创建 mcp_settings.json 配置文件，并挂载数据卷以持久化状态。
  notes_en: You need to first create the mcp_settings.json configuration file and mount a data volume to persist state.
config_required:
- mcp_settings.json 配置文件
- 可选：ADMIN_PASSWORD 环境变量
