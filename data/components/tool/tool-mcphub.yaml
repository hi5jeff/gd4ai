  first_prompt_zh: 打开 MCPHub 仪表盘，开始管理我的 MCP 服务器。
  first_prompt_en: Open the MCPHub dashboard to start managing my MCP servers.
name_en: MCPHub
description_en: MCPHub is a unified hub for centrally managing and dynamically orchestrating multiple MCP servers. It provides
  flexible HTTP/SSE endpoints, allowing users to access all servers, individual servers, or logical groups, and supports intelligent
  routing, OAuth authentication, hot-reload configuration, tool result compression, and more. Suitable for developers or teams
  that need to efficiently manage multiple MCP services.
