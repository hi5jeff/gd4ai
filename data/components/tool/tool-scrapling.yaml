name_en: Scrapling
description_en: Scrapling is an adaptive web scraping framework that supports from single requests to full-scale crawling.
  It provides intelligent selectors, automatic anti-bot handling, asynchronous concurrency, multiple fetcher backends (such
  as Playwright, HTTPX), and AI-assisted parsing capabilities. Suitable for data collection engineers, automation testers,
  AI data preparers, etc., enabling quick construction of stable and efficient crawler systems.
