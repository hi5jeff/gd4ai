description_zh: Scrapling 是一个自适应的 Web 抓取框架，支持从单个请求到全规模爬取。它提供智能选择器、自动处理反爬机制、异步并发、多种 fetcher 后端（如 Playwright、HTTPX）以及 AI 辅助解析功能。适合数据采集工程师、自动化测试人员、AI
  数据准备者等用户，可快速构建稳定高效的爬虫系统。
