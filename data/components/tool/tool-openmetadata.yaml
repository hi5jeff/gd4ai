name_en: OpenMetadata
description_en: OpenMetadata is an open-source metadata management platform that provides data catalog, data lineage, data
  governance, and an AI context layer. It connects to 130+ data sources, builds a unified knowledge graph, and helps data
  teams and AI assistants discover, understand, trust, and use data. Suitable for data engineers, data scientists, AI developers,
  and governance teams.
