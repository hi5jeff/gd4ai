name_en: CloudCLI (Claude Code UI)
description_en: CloudCLI (also known as Claude Code UI) is a free and open-source web/desktop user interface that lets you
  remotely manage sessions and projects for Claude Code, Cursor CLI, and Codex from your phone, tablet, or computer. It offers
  responsive design, interactive chat, built-in terminal, file browser, Git management, browser automation, and more, making
  it ideal for developers, remote workers, and team collaboration who need to use AI coding assistants anytime, anywhere.
