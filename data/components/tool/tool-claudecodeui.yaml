description_zh: CloudCLI（又名Claude Code UI）是一个免费开源的Web/桌面用户界面，让你在手机、平板或电脑上远程管理Claude Code、Cursor CLI和Codex的会话与项目。它提供响应式设计、交互式聊天、内置终端、文件浏览器、Git管理、浏览器自动化等功能，适合需要随时随地使用AI编码助手的开发者、远程工作者和团队协作场景。
