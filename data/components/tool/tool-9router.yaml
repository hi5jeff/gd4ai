  last_commit: '2026-07-10'
  verified: false
source:
  repo: https://github.com/decolua/9router
usage:
  first_prompt_zh: 帮我连接一个免费的 AI 模型，比如 Kiro AI。
  first_prompt_en: Help me connect to a free AI model, such as Kiro AI.
name_en: 9router
description_en: 9Router is a free AI routing and token saving tool that connects mainstream AI coding tools like Claude Code,
  Codex, Cursor, Cline to 40+ providers and 100+ models. It uses RTK technology to automatically compress tool output, saving
  20-40% token consumption, and supports a three-level automatic fallback (subscription → cheap → free) to ensure coding never
  stops. Suitable for developers who want to reduce AI coding costs and avoid rate limits.
