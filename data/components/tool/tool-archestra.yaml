description_zh: Archestra是一个开源企业级AI平台，集成了安全护栏、MCP注册表、网关和编排器。它提供聊天界面供非技术用户使用，同时为开发者提供LLM代理门户（支持Claude Code、Codex、Cursor等），具备LLM网关（支持多种提供商）、MCP网关（OAuth认证）、A2A网关、私有MCP注册表、Kubernetes编排器、代理运行时（支持定时/邮件/webhook触发）、RAG知识库和迷你应用构建器。适合需要统一管理AI代理和工具的企业团队。
