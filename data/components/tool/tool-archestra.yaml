name_en: archestra
description_en: Archestra is an open-source enterprise-grade AI platform that integrates safety guardrails, MCP registry,
  gateway, and orchestrator. It provides a chat interface for non-technical users, while offering developers an LLM agent
  portal (supporting Claude Code, Codex, Cursor, etc.), with an LLM gateway (supporting multiple providers), MCP gateway (OAuth
  authentication), A2A gateway, private MCP registry, Kubernetes orchestrator, agent runtime (supporting scheduled/email/webhook
  triggers), RAG knowledge base, and mini app builder. Suitable for enterprise teams that need unified management of AI agents
  and tools.
