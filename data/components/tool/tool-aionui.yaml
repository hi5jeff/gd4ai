name_en: AionUi
description_en: AionUi is a free, open-source, locally running AI collaboration platform that supports over 20 CLI tools including
  Claude Code, Codex, Hermes Agent, etc. It allows AI agents to directly read and write files, write code, browse the web,
  and automatically execute multi-step tasks on your computer, while also providing remote access (WebUI/Telegram/WeChat,
  etc.) and scheduled task capabilities. Suitable for developers, teams, and automation enthusiasts, it can be started with
  zero configuration by simply providing an API Key.
