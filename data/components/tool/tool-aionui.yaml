name: AionUi
description_zh: AionUi 是一款免费、开源、本地运行的 AI 协作平台，支持 Claude Code、Codex、Hermes Agent 等 20 多种 CLI 工具。它让 AI 代理在你的电脑上直接读写文件、编写代码、浏览网页并自动执行多步骤任务，同时提供远程访问（WebUI/Telegram/微信等）和定时调度功能。适合开发者、团队和自动化爱好者，只需提供
  API Key 即可零配置启动。
