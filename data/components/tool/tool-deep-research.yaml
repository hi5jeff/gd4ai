name_en: deep-research
description_en: Deep Research is a deep research tool based on multiple large language models (LLMs) that can generate detailed
  research reports in about 2 minutes. It supports mainstream models such as Gemini, OpenAI, Anthropic, Deepseek, and integrates
  web search, local knowledge base, chain-of-thought, and task models. It offers WYSIWYG editing and Markdown editing modes.
  Users can deploy it with one click to Vercel or Cloudflare, with all data stored locally, emphasizing privacy. Suitable
  for researchers, students, and professionals who need quick access to in-depth analysis.
