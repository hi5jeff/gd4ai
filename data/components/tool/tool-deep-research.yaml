description_zh: Deep Research 是一个基于多种大语言模型（LLM）的深度研究工具，可在约2分钟内生成详尽的研究报告。它支持 Gemini、OpenAI、Anthropic、Deepseek 等主流模型，并集成网络搜索、本地知识库、思维链与任务模型，提供所见即所得的编辑和
  Markdown 编辑模式。用户可一键部署到 Vercel 或 Cloudflare，所有数据本地存储，注重隐私。适合研究人员、学生及需要快速获取深度分析的专业人士。
