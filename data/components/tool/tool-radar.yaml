name_en: Radar
description_en: Radar is an open-source Kubernetes visualization dashboard that runs as a single binary file, requiring no
  agent installation or account registration. It provides cluster topology, resource browsing, Helm management, GitOps status,
  service traffic, audit logs, RBAC analysis, and more, with a built-in MCP server for AI agents to query the cluster. Suitable
  for developers and operators who need fast, lightweight, real-time monitoring of Kubernetes clusters.
