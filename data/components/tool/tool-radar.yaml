name: Radar
description_zh: Radar 是一款开源的 Kubernetes 可视化仪表盘，以单二进制文件运行，无需安装代理或注册账户。它提供集群拓扑、资源浏览、Helm 管理、GitOps 状态、服务流量、审计日志、RBAC 分析等功能，并内置
  MCP 服务器供 AI 代理查询集群。适合需要快速、轻量、实时监控 Kubernetes 集群的开发者和运维人员。
