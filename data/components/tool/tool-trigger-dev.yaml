usage:
  first_prompt_zh: 创建一个新的 AI 代理任务，让它自动处理用户请求。
  first_prompt_en: Create a new AI agent task to automatically handle user requests.
name_en: Trigger.dev
description_en: Trigger.dev is an open-source platform for building and deploying fully managed AI agents and workflows in
  TypeScript. It provides long-running tasks (no timeout), retry mechanisms, queues, observability, and elastic scaling, supporting
  human-in-the-loop approval, real-time streaming, and custom runtime environments. Suitable for developers who need to build
  reliable AI applications, automate background tasks, or complex workflows.
