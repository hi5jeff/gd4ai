  notes_zh: 通过 npm 安装 SDK（如 npm install @trigger.dev/sdk），或直接使用云平台服务，需注册账号并获取 API Key。
  notes_en: Install the SDK via npm (e.g., npm install @trigger.dev/sdk), or directly use the cloud platform service, requiring
    registration and obtaining an API Key.
config_required:
- Trigger.dev API key
quality:
