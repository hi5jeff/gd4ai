id: tool-trigger-dev
type: tool
name: Trigger.dev
description_zh: Trigger.dev 是一个开源平台，用于在 TypeScript 中构建和部署完全托管的 AI 代理与工作流。它提供长时间运行的任务（无超时）、重试机制、队列、可观测性及弹性伸缩，支持人类参与审批、实时流式传输和自定义运行时环境。适合需要构建可靠
  AI 应用、自动化后台任务或复杂工作流的开发者。
