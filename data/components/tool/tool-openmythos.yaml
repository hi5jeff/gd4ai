name: OpenMythos
description_zh: 基于公开研究文献从第一性原理重建的Claude Mythos架构理论实现。采用循环深度Transformer（RDT），包含前奏、循环块和尾声三个阶段，支持MLA和GQA注意力切换以及稀疏MoE前馈。适合AI研究人员和开发者探索计算自适应、深度可变推理机制。
