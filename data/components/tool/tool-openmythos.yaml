name_en: OpenMythos
description_en: 'A theoretical implementation of the Claude Mythos architecture reconstructed from first principles based
  on publicly available research literature. It employs a Recurrent Deep Transformer (RDT), consisting of three stages: prelude,
  recurrent block, and coda. It supports switching between MLA and GQA attention mechanisms as well as sparse MoE feedforward.
  Suitable for AI researchers and developers to explore computation-adaptive and depth-variable inference mechanisms.'
