name: QuantDinger
description_zh: QuantDinger 是一个开源 AI 量化交易操作系统，支持加密货币、股票、外汇等多市场。它提供从交易想法到 Python 策略生成、回测、纸交易、实盘执行和监控的全流程工具，内置多智能体研究框架，兼容 Binance、Coinbase
  等主流交易所。适合量化交易开发者、AI 研究者和个人投资者快速构建和部署自动化交易策略。
