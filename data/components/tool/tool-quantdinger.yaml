name_en: QuantDinger
description_en: QuantDinger is an open-source AI quantitative trading operating system that supports multiple markets including
  cryptocurrencies, stocks, and forex. It provides a full workflow from trading ideas to Python strategy generation, backtesting,
  paper trading, live execution, and monitoring, with a built-in multi-agent research framework and compatibility with major
  exchanges such as Binance and Coinbase. It is suitable for quantitative trading developers, AI researchers, and individual
  investors to quickly build and deploy automated trading strategies.
