name_en: esp32_nat_router
description_en: AI-enhanced NAT router/firewall firmware based on ESP32, supporting WiFi NAT routing, WireGuard VPN tunnel,
  DHCP service, port forwarding, firewall ACL, PCAP packet capture, and WPA2-Enterprise authentication. Suitable for users
  needing low-cost WiFi extension, IoT network isolation, home automation monitoring, or VPN routing. Configurable via web
  interface or serial CLI.
