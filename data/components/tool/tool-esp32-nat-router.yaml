description_zh: 基于ESP32的AI增强型NAT路由器/防火墙固件，支持WiFi NAT路由、WireGuard VPN隧道、DHCP服务、端口转发、防火墙ACL、PCAP抓包和WPA2-Enterprise认证。适合需要低成本WiFi扩展、IoT网络隔离、家庭自动化监控或VPN路由的用户，可通过Web界面或串口CLI配置。
