name_en: mcptools
description_en: MCP Tools is a comprehensive command-line tool for interacting with MCP (Model Context Protocol) servers.
  It supports discovering, invoking, and managing tools, resources, and prompts, with multiple transport methods (stdio/HTTP)
  and output formats (JSON, tables, etc.). It also includes advanced features such as an interactive shell, mock server, proxy
  mode, and project scaffolding. Suitable for MCP developers, AI application integrators, and users who need to debug or test
  MCP servers.
