name: mcptools
description_zh: MCP Tools 是一个功能全面的命令行工具，用于与 MCP（模型上下文协议）服务器交互。它支持发现、调用和管理工具、资源及提示，提供多种传输方式（stdio/HTTP）和输出格式（JSON、表格等），还包含交互式
  Shell、Mock 服务器、代理模式和项目脚手架等高级功能。适合 MCP 开发者、AI 应用集成者以及需要调试或测试 MCP 服务器的用户。
