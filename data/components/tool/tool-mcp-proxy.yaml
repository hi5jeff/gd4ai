name_en: mcp-proxy
description_en: mcp-proxy is an MCP transport protocol bridging tool that supports converting stdio transport to SSE/Streamable
  HTTP, or converting SSE to stdio. It allows MCP clients that only support stdio (such as Claude Desktop) to connect to remote
  SSE MCP servers, while also supporting OAuth2 authentication and custom request headers. Suitable for developers and automation
  scenarios that need to remotely call MCP services.
