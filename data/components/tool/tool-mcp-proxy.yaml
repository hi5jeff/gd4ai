id: tool-mcp-proxy
type: tool
name: mcp-proxy
description_zh: mcp-proxy 是一个 MCP 传输协议桥接工具，支持将 stdio 传输转换为 SSE/Streamable HTTP，或将 SSE 转换为 stdio。它允许仅支持 stdio 的 MCP 客户端（如 Claude
  Desktop）连接远程 SSE MCP 服务器，同时支持 OAuth2 认证和自定义请求头。适合需要远程调用 MCP 服务的开发者和自动化场景。
