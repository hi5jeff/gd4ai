  command: npm install
  notes_zh: 先通过GitHub的'Use this template'创建自己的仓库，然后克隆到本地，在项目根目录运行npm install安装依赖。
  notes_en: First, create your own repository via GitHub's 'Use this template' button, then clone it locally, and run npm
    install in the project root to install dependencies.
