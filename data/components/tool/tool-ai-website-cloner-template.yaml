name_en: AI Website Cloner Template
description_en: This is an AI-powered website cloning template that reverse-engineers any website into a clean Next.js codebase
  with a single command. It leverages AI coding agents (such as Claude Code) to automatically analyze the target website,
  extract design tokens and assets, write component specifications, and rebuild each section in parallel. Ideal for developers,
  designers, and AI agent users who want to quickly replicate a website's structure and style.
