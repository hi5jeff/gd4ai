name: AI Website Cloner Template
description_zh: 这是一个AI驱动的网站克隆模板，通过一条命令即可将任意网站逆向工程为干净的Next.js代码库。它利用AI编码代理（如Claude Code）自动分析目标网站、提取设计令牌和资源、编写组件规范并并行重建每个部分。适合希望快速复制网站结构和样式的开发者、设计师及AI代理用户。
