name_en: OmniRoute
description_en: OmniRoute is a free AI gateway that aggregates 250+ providers (90+ free) through a single endpoint, supporting
  tools like Claude Code, Codex, Cursor, Cline, and Copilot. It uses RTK+Caveman compression to save 15-95% tokens, with intelligent
  automatic fallback, MCP/A2A protocols, and multimodal API capabilities. Ideal for developers and AI tool users looking to
  reduce API costs and centrally manage multi-model calls.
