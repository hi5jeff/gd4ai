name: OmniRoute
description_zh: OmniRoute 是一个免费 AI 网关，通过单一端点聚合 250+ 提供商（其中 90+ 免费），支持 Claude Code、Codex、Cursor、Cline、Copilot 等工具。采用 RTK+Caveman
  压缩技术节省 15-95% tokens，具备智能自动回退、MCP/A2A 协议和多模态 API 能力。适合希望降低 API 成本、统一管理多模型调用的开发者与 AI 工具使用者。
