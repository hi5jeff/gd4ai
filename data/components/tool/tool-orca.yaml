usage:
  first_prompt_zh: 帮我同时运行三个编码代理，分别用不同的模型解决这个 Python 性能问题。
  first_prompt_en: Help me run three coding agents simultaneously, each using a different model to solve this Python performance
    issue.
name_en: Orca
description_en: Orca is a desktop and mobile AI agent orchestration tool that allows users to run multiple coding agents simultaneously
  (such as Codex, Claude Code, OpenCode, etc.), each executing in an independent Git working tree, making it easy to compare
  results and merge the best solutions. It supports monitoring and directing agents from a phone, ideal for developers who
  need efficient parallel development and multi-solution comparison.
