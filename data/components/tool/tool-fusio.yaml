name_en: Fusio
description_en: Fusio is a self-hosted, open-source API management platform written in PHP. It transforms your business logic
  into scalable API products, supporting database API gateway, microservice orchestration, custom backend logic, AI agent
  development, MCP integration, developer portal, SDK auto-generation, API monetization, and more. Suitable for developers,
  teams, and enterprises that need to quickly build and publish professional APIs.
