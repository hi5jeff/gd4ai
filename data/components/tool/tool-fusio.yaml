name: Fusio
description_zh: Fusio是一个自托管的开源API管理平台，用PHP编写。它能将你的业务逻辑转化为可扩展的API产品，支持数据库API网关、微服务编排、自定义后端逻辑、AI代理开发、MCP集成、开发者门户、SDK自动生成、API货币化等功能。适合需要快速构建和发布专业API的开发者、团队和企业。
