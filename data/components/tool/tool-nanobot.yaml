name_en: nanobot
description_en: nanobot is an open-source, ultra-lightweight personal AI agent that you can truly own. It keeps the core small
  and readable while providing practical features such as WebUI, chat channels, tools, memory, MCP, model routing, automation,
  and deployment, suitable for developers and ordinary users who want to have an autonomous AI assistant and integrate it
  into daily tools, chats, and workflows.
