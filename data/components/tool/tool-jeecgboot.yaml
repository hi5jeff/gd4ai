description_zh: JeecgBoot是一款企业级AI低代码开发平台，支持低代码与零代码双模式。内置AI应用平台（聊天、知识库、流程编排、MCP插件），兼容主流大模型。具备Skills能力，可通过自然语言一句话生成完整系统、代码、流程、表单、报表和大屏，覆盖JeecgBoot全场景。适合Java开发者快速构建企业级Web应用，解决80%重复工作。
