name_en: TrendRadar
description_en: AI-powered public opinion monitoring and trending topic filtering tool that aggregates hot topics from multiple
  platforms and RSS feeds. It supports precise keyword filtering, AI translation, and analysis brief push. Integrated with
  WeChat, Feishu, DingTalk, Telegram, email, and other channels. Supports Docker deployment with data stored locally or in
  the cloud. Can be connected to MCP architecture for natural language analysis, sentiment insights, and trend prediction.
  Ideal for individuals or teams seeking efficient information gathering.
