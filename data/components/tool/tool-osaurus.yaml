description_zh: Osaurus 是一款专为 macOS（Apple Silicon）设计的原生 AI 代理框架，完全使用 Swift 构建，支持离线运行。它充当用户与任意模型（本地或云端）之间的中间层，提供持久记忆、自主执行、代码运行和加密身份等核心能力。适合希望在本地掌控
  AI 上下文、记忆和工具的开发者与高级用户，实现真正个人化的 AI 体验。
