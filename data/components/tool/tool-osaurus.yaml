name_en: Osaurus
description_en: Osaurus is a native AI agent framework designed specifically for macOS (Apple Silicon), built entirely in
  Swift, and supports offline operation. It acts as an intermediary layer between the user and any model (local or cloud),
  providing core capabilities such as persistent memory, autonomous execution, code running, and encrypted identity. Suitable
  for developers and advanced users who want to control AI context, memory, and tools locally, enabling a truly personalized
  AI experience.
