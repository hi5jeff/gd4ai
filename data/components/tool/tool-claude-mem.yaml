name_en: claude-mem
description_en: claude-mem is a persistent memory compression system designed for AI agents like Claude Code. It automatically
  captures all operations of the agent during a session, compresses them using AI, and injects relevant context into future
  sessions, enabling cross-session continuous memory. Suitable for AI agent users who need long-term memory support, it can
  significantly improve development efficiency and contextual coherence.
