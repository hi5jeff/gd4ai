description_zh: claude-mem 是一个为 AI 代理（如 Claude Code）设计的持久化记忆压缩系统。它能自动捕获代理在会话中的所有操作，利用 AI 进行压缩，并在未来会话中注入相关上下文，实现跨会话的连续记忆。适合需要长期记忆支持的
  AI 代理用户，可显著提升开发效率和上下文连贯性。
