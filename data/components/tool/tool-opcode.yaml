name_en: opcode
description_en: opcode is a desktop GUI application and toolkit built on Tauri 2, designed specifically for Claude Code. It
  offers visual project management, session history browsing, custom AI agent creation, background agent execution, usage
  analytics dashboard, MCP server management, timeline and checkpoint features. Suitable for developers who need a more intuitive
  and efficient way to manage Claude Code workflows, upgrading the command-line experience to a graphical operations center.
