description_zh: opcode 是一款基于 Tauri 2 构建的桌面 GUI 应用和工具包，专为 Claude Code 设计。它提供可视化项目管理、会话历史浏览、自定义 AI 代理创建、后台代理运行、使用分析仪表盘、MCP 服务器管理、时间线与检查点等功能。适合需要更直观、高效地管理
  Claude Code 工作流的开发者，将命令行体验升级为图形化操作中心。
