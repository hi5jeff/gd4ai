name_en: code-graph-rag
description_en: Code-Graph-RAG is a knowledge graph-based Retrieval-Augmented Generation (RAG) system designed for multilingual
  codebases. It uses Tree-sitter to parse code, builds a comprehensive knowledge graph, and supports natural language queries
  for code structure, relationships, and editing functions. Suitable for developers and technical teams for code understanding,
  search, and automated analysis.
