description_zh: Code-Graph-RAG 是一个基于知识图谱的检索增强生成（RAG）系统，专为多语言代码库设计。它利用 Tree-sitter 解析代码，构建全面的知识图谱，支持自然语言查询代码结构、关系以及编辑功能。适合开发者、技术团队进行代码理解、搜索和自动化分析。
