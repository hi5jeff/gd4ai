  notes_zh: macOS 用户可直接用 Homebrew 安装，其他系统需从 GitHub Releases 下载对应平台的可执行文件。
  notes_en: macOS users can install it directly via Homebrew; users on other systems need to download the executable for their
    platform from GitHub Releases.
config_required:
- Slack 用户 Token 或 Cookie
