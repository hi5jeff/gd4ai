id: tool-slackdump
type: tool
name: slackdump
description_zh: Slackdump 是一款开源的 Slack 数据导出工具，无需管理员权限即可备份私有和公共频道的消息、线程、文件、用户和表情。支持 Slack Export、SQLite、JSON 等多种导出格式，可增量归档，并内置
  MCP Server 功能，允许 AI 代理（如 Claude）直接访问 Slack 数据。适合需要本地备份 Slack 数据、迁移到 Mattermost 或使用 AI 分析聊天记录的用户。
