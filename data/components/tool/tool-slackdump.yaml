  first_prompt_zh: 列出我的 Slack 工作区中的所有频道。
  first_prompt_en: List all channels in my Slack workspace.
name_en: slackdump
description_en: Slackdump is an open-source Slack data export tool that allows you to back up messages, threads, files, users,
  and emojis from private and public channels without requiring admin permissions. It supports multiple export formats such
  as Slack Export, SQLite, and JSON, enables incremental archiving, and includes a built-in MCP Server feature that allows
  AI agents (like Claude) to directly access Slack data. It is suitable for users who need to locally back up Slack data,
  migrate to Mattermost, or use AI to analyze chat logs.
