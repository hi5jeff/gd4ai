name: Dagu
description_zh: Dagu 是一个轻量级、自包含的工作流引擎，提供 Web UI，适合小团队使用。它通过声明式 YAML 定义有向无环图（DAG），支持 Shell 命令、Docker、Kubernetes、SSH 远程命令等多种执行方式。无需数据库，单二进制文件即可运行。内置
  MCP 支持，允许 AI 代理管理工作流。可替代 Cron 或 Airflow 进行任务调度、数据管道编排和自动化运维。
