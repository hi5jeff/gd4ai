name_en: Dagu
description_en: Dagu is a lightweight, self-contained workflow engine with a Web UI, suitable for small teams. It defines
  directed acyclic graphs (DAGs) using declarative YAML and supports multiple execution methods such as Shell commands, Docker,
  Kubernetes, and SSH remote commands. No database required; runs as a single binary. Built-in MCP support allows AI agents
  to manage workflows. It can replace Cron or Airflow for task scheduling, data pipeline orchestration, and automated operations.
