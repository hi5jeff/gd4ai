name_en: Lemonade
description_en: Lemonade is a free local AI server that supports running optimized LLMs on GPU and NPU, providing APIs compatible
  with OpenAI, Anthropic, and Ollama. Users can engage in chat, coding, voice, and image generation, with all data processed
  entirely locally to ensure privacy. Suitable for developers, AI enthusiasts, and users who need offline or private deployment.
