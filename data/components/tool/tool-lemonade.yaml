name: Lemonade
description_zh: Lemonade 是一款免费的本地 AI 服务器，支持在 GPU 和 NPU 上运行优化的 LLM，提供与 OpenAI、Anthropic 和 Ollama 兼容的 API。用户可进行聊天、编码、语音和图像生成，所有数据完全本地处理，保障隐私。适合开发者、AI
  爱好者及需要离线或私有部署的用户。
