  first_prompt_zh: 运行 rtk --help 查看使用说明
  first_prompt_en: Run rtk --help to see usage instructions
name_en: rtk
description_en: rtk (Rust Token Killer) is a high-performance CLI proxy tool that filters and compresses command output before
  it reaches the LLM context, reducing token consumption by an average of 60-90%. It supports over 100 common commands (such
  as ls, cat, git, cargo test, etc.), is a single Rust binary with zero dependencies, and has sub-10ms latency. Ideal for
  developers using AI coding tools like Claude Code, it can significantly reduce API costs.
