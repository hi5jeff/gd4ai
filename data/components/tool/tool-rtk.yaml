id: tool-rtk
type: tool
name: rtk
description_zh: rtk（Rust Token Killer）是一个高性能CLI代理工具，能在命令输出到达LLM上下文之前进行过滤和压缩，平均减少60-90%的token消耗。支持100+常用命令（如ls、cat、git、cargo
  test等），单Rust二进制文件零依赖，延迟低于10ms。适合使用Claude Code等AI编码工具的开发者，可显著降低API成本。
