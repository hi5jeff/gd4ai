id: tool-kubefwd
type: tool
name: kubefwd
description_zh: kubefwd 是一个 Kubernetes 批量端口转发工具，允许开发者在本地机器上通过服务名称直接访问集群中的服务，无需修改代码或配置。它自动为每个服务分配唯一回环 IP、更新 /etc/hosts 并建立端口转发，支持交互式
  TUI 和自动重连。适合需要频繁与 Kubernetes 集群交互的微服务开发者，可显著简化本地开发环境配置。
