description_zh: Nunu 是一个基于 Go 生态流行库（Gin、Gorm、Wire 等）构建的脚手架 CLI 工具，帮助开发者快速搭建高效、可扩展的 Go 应用程序。它采用经典分层架构，内置依赖注入、单元测试支持，适合 Go 后端开发者用于快速启动项目。
