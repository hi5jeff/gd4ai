name_en: cmux
description_en: cmux is an open-source macOS terminal based on Ghostty, designed specifically for AI coding agents. It offers
  vertical tabs, notification rings, and a notification panel, allowing users to easily manage multiple coding agent sessions.
  Built-in browser support and terminal split-screen, along with SSH functionality, enable the creation of remote workspaces.
  Suitable for AI agent users and developers who need efficient multitasking, organization, and programmability.
