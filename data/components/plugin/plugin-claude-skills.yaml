name_en: claude-skills
description_en: An open-source library containing 355 production-grade Claude Code skills, plugins, and agent skills, supporting
  13 AI coding tools including Claude Code, Codex, Gemini CLI, Cursor, and more. Covers engineering, DevOps, marketing, security,
