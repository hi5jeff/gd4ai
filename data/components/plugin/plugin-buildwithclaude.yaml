id: plugin-buildwithclaude
type: plugin
name: Build with Claude
description_zh: Build with Claude 是一个为 Claude Code 打造的插件市场和发现平台，汇集了数千个社区贡献的插件、代理、命令、钩子、技能和 MCP 服务器。用户可以通过添加市场来浏览、搜索和安装各类扩展，从而快速增强
  Claude Code 的功能，提升开发效率。适合所有希望扩展 Claude Code 工作流的开发者。
host_tools:
- claude-code
