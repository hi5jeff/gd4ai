install:
  method: manual
  notes_zh: 在 Claude Code 中执行该命令即可添加市场，之后可通过 /plugin search @buildwithclaude 浏览和安装插件。
  notes_en: Run this command in Claude Code to add the marketplace, then use /plugin search @buildwithclaude to browse and
    install plugins.
