name_en: Build with Claude
description_en: Build with Claude is a plugin marketplace and discovery platform built for Claude Code, bringing together
  thousands of community-contributed plugins, agents, commands, hooks, skills, and MCP servers. Users can add the marketplace
  to browse, search, and install various extensions, quickly enhancing Claude Code's capabilities and boosting development
  efficiency. It's ideal for any developer looking to extend their Claude Code workflow.
