  first_prompt_en: Start team collaboration mode
name_en: oh-my-claudecode
description_en: oh-my-claudecode is a team-first multi-agent orchestration tool for Claude Code, enabling multiple AI agents
  to collaborate on complex development tasks. It has zero learning curve and enables team collaboration mode in Claude Code
  through simple plugin installation, suitable for developers who need multi-role division and automated workflows. Supports
  custom workflows and agent roles to improve coding efficiency.
