usage:
  first_prompt_zh: 帮我分析当前代码库，生成知识图谱并展示关键模块和依赖关系。
  first_prompt_en: Help me analyze the current codebase, generate a knowledge graph, and display key modules and dependencies.
name_en: Understand Anything
description_en: Transform any codebase, knowledge base, or documentation into an interactive knowledge graph, supporting exploration,
  search, and questioning. Analyze project structure through a multi-agent pipeline, build a knowledge graph containing files,
  functions, classes, and dependencies, and provide a visual dashboard. Suitable for developers, tech leads, and AI agent
  users who need to quickly understand large codebases.
