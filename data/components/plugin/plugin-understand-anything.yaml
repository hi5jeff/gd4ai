id: plugin-understand-anything
type: plugin
name: Understand Anything
description_zh: 将任何代码库、知识库或文档转化为交互式知识图谱，支持探索、搜索和提问。通过多智能体管道分析项目结构，构建包含文件、函数、类和依赖关系的知识图谱，并提供可视化仪表盘。适合需要快速理解大型代码库的开发者、技术负责人和AI代理用户。
