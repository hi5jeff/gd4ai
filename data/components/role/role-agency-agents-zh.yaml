name_en: agency-agents-zh
description_en: A collection of 266 plug-and-play AI expert roles, covering 20 departments including engineering, design,
  marketing, finance, etc. Each role has its own persona, professional workflow, and deliverable outputs. Supports 18 AI coding
  tools such as Claude Code, Cursor, Copilot, and adds 50 original AI agents for the Chinese market (for platforms like Xiaohongshu,
  Douyin, WeChat operations and vertical domains). Suitable for teams and individuals who need to quickly invoke professional
  AI roles for collaborative development.
