name_en: Claude Code Game Studios
description_en: Transforms a single Claude Code session into a complete game development studio, featuring 49 specialized
  AI agents (covering design, programming, art, audio, narrative, QA, and production), 73 workflow skills, 12 automation hooks,
  and 11 coding rules. By simulating a real studio hierarchy, it provides design review, quality gates, and project organization
  capabilities for AI-assisted game development. Suitable for indie developers and small teams who want to build games efficiently
  with AI while maintaining project standards.
