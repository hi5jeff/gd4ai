description_zh: 将单个 Claude Code 会话转变为完整的游戏开发工作室，包含 49 个专业化 AI 代理（覆盖策划、编程、美术、音频、叙事、QA 和生产）、73 个工作流技能、12 个自动化钩子和 11 条编码规则。通过模拟真实工作室层级结构，为
  AI 辅助游戏开发提供设计评审、质量门禁和项目组织能力。适合希望用 AI 高效构建游戏并保持项目规范的独立开发者和小团队。
