id: workflow-ai-job-search
type: workflow
name: AI Job Search
description_zh: 基于Claude Code的AI求职应用框架，运行在本地机器上。它能自动抓取招聘信息、评估岗位匹配度、定制简历（LaTeX）、撰写求职信并模拟面试准备。适合正在求职的开发者，尤其是使用Claude Code的用户，通过结构化工作流提升求职效率。
