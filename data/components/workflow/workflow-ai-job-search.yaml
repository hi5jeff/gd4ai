  first_prompt_en: Start my job search journey and help me evaluate the latest job postings.
name_en: AI Job Search
description_en: An AI job search application framework based on Claude Code, running on a local machine. It automatically
  scrapes job postings, evaluates job match, customizes resumes (LaTeX), writes cover letters, and simulates interview preparation.
  Suitable for developers who are job hunting, especially those using Claude Code, to improve job search efficiency through
  structured workflows.
