name_en: ARIS
description_en: ARIS (Auto-Research-In-Sleep) is a lightweight Markdown skill set designed for autonomous machine learning
  research. It supports cross-model review loops, idea discovery, and experiment automation without framework binding, and
  can be seamlessly integrated into AI coding agents such as Claude Code, Codex CLI, and Cursor. Suitable for AI developers
  and researchers looking to improve research efficiency.
