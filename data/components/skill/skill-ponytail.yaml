description_zh: Ponytail 是一个 AI 代理技能，让 Claude Code 等编码助手像懒惰的高级开发者一样思考，用最少的代码完成任务。它平均减少约 54% 的代码量（最高可达 94%），同时降低成本约 20%、提升速度约
  27%，且保持 100% 安全。适合使用 AI 编码工具的开发者，避免过度工程化，生成简洁高效的代码。
