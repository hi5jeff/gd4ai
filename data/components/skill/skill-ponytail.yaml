name_en: ponytail
description_en: Ponytail is an AI agent skill that makes coding assistants like Claude Code think like a lazy senior developer,
  completing tasks with minimal code. It reduces code volume by an average of about 54% (up to 94%), while cutting costs by
  about 20%, increasing speed by about 27%, and maintaining 100% safety. Suitable for developers using AI coding tools, it
  avoids over-engineering and generates concise, efficient code.
