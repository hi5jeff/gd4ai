name_en: academic-research-skills
description_en: An academic research skills suite designed for Claude Code, covering the entire workflow from literature review,
  paper writing, peer review to final submission. It provides Socratic dialogue-based paper structure planning, style calibration,
  citation verification, logical consistency checking, and other features to help researchers efficiently complete academic
  output while maintaining human-led critical thinking. Suitable for researchers who need AI assistance but reject full automation.
