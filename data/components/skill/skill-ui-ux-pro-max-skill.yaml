name: UI UX Pro Max
description_zh: 这是一个为 Claude Code、Codex、Cursor 等 AI 编程工具提供专业 UI/UX 设计智能的 AI 技能。它内置 161 条推理规则和 67 种 UI 风格，能根据项目需求自动生成完整的设计系统、组件样式和布局建议。适合前端开发者、设计师以及使用
  AI 辅助编程的用户，帮助快速构建跨平台的专业界面。
