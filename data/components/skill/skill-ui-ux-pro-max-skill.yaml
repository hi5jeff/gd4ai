  first_prompt_en: Help me design a modern login page with brand colors and responsive layout.
name_en: UI UX Pro Max
description_en: This is an AI skill that provides professional UI/UX design intelligence for AI coding tools such as Claude
  Code, Codex, and Cursor. It has 161 built-in reasoning rules and 67 UI styles, and can automatically generate complete design
  systems, component styles, and layout suggestions based on project requirements. Suitable for front-end developers, designers,
  and users of AI-assisted programming, helping to quickly build professional cross-platform interfaces.
