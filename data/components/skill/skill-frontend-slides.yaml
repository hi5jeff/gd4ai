description_en: Frontend Slides is a Claude Code skill that enables non-designers to quickly create beautiful HTML presentations
  using natural language. It supports generating from scratch or converting PowerPoint files, offers visual style previews
  and curated templates, and produces production-quality single-file slides without requiring CSS/JavaScript knowledge. Ideal
  for developers and content creators who need to create presentations quickly.
