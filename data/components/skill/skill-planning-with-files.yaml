description_zh: 基于文件的持久化规划技能，专为AI编码代理设计。通过维护 task_plan.md、findings.md 和 progress.md 文件，使代理在上下文丢失、/clear 或崩溃后仍能恢复任务。支持长期运行任务、完成门控机制和多代理共享状态，兼容
