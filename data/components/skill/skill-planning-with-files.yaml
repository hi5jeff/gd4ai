name_en: planning-with-files
description_en: File-based persistent planning skill, designed specifically for AI coding agents. By maintaining task_plan.md,
  findings.md, and progress.md files, it enables agents to resume tasks after context loss, /clear, or crashes. Supports long-running
  tasks, completion gating mechanisms, and multi-agent shared state. Compatible with 60+ agents including Claude Code, Codex
  CLI, Cursor, etc. Suitable for developers who need stable, recoverable planning workflows.
