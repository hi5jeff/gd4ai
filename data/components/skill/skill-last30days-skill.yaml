description_en: An AI agent skill that simultaneously searches multiple platforms including Reddit, X, YouTube, Hacker News,
  Polymarket, etc., ranks results based on signals such as likes, votes, and real-money bets, and synthesizes a concise summary
  via an AI judge. Suitable for researchers, developers, and investors who need to quickly understand the latest community
  trends on a topic. Zero-configuration for platforms like Reddit and HN; after running once, more platforms can be unlocked
  via a wizard.
