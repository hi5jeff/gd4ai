name_en: ai-berkshire
description_en: 'A value investing research framework based on Claude Code / Codex, systematically integrating the investment
  methodologies of four masters: Buffett, Munger, Duan Yongping, and Li Lu. Through multi-agent parallel research, forced
  conclusion output, anti-bias mechanisms, and precise financial calculations, it achieves professional-level individual stock
  analysis. Suitable for value investors and individual researchers, enabling one person to accomplish the work of an investment
  research team.'
