id: skill-taste-skill
type: skill
name: taste-skill
description_zh: Taste Skill 是一套可移植的 AI Agent 技能集，旨在提升 AI 生成前端界面的设计质量——包括更强的布局、排版、动效和间距，避免千篇一律的模板化 UI。同时提供图像生成技能，用于创建参考板（Web、移动端、品牌套件）。适合使用
  Claude Code、Codex、Cursor 等 AI 编码工具的开发者，通过简单安装即可让 AI 输出更具品味的前端代码。
