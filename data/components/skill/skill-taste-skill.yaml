  first_prompt_en: Please use Taste Skill to optimize my frontend interface design and make it more tasteful.
name_en: taste-skill
description_en: Taste Skill is a portable set of AI Agent skills aimed at enhancing the design quality of AI-generated frontend
  interfaces—featuring improved layout, typography, motion, and spacing to avoid generic templated UI. It also includes image
  generation skills for creating reference boards (web, mobile, brand kits). Ideal for developers using AI coding tools like
  Claude Code, Codex, and Cursor, a simple installation enables AI to produce frontend code with greater taste.
