name_en: agent-skills
description_en: Agent Skills is a production-grade engineering skill set for AI coding agents, encapsulating senior engineers'
  workflows, quality gates, and best practices into reusable skill modules. It covers the complete development lifecycle from
  requirements definition, planning, building, testing, reviewing to release, providing 8 slash commands (e.g., /spec, /plan,
  /build) to automatically activate corresponding skills. Suitable for developers using AI coding tools such as Claude Code,
  Cursor, Codex, it helps agents consistently follow engineering standards, improving code quality and development efficiency.
