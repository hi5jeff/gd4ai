description_zh: Agent Skills 是一套面向 AI 编码代理的生产级工程技能集合，将资深工程师的工作流、质量门和最佳实践封装为可复用的技能模块。它覆盖从需求定义、计划、构建、测试、审查到发布的完整开发生命周期，提供 8
  个斜杠命令（如 /spec、/plan、/build）自动激活对应技能。适合使用 Claude Code、Cursor、Codex 等 AI 编码工具的开发者，帮助代理一致地遵循工程规范，提升代码质量和开发效率。
