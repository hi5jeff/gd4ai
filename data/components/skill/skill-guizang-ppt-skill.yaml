name: guizang-ppt-skill
description_zh: 一个适配 Claude Code / Codex 等 AI Agent 环境的网页 PPT 技能，用于生成单文件 HTML 横向翻页 PPT、PPT 配图和多平台封面。内置电子杂志风（Style A）和瑞士国际主义（Style
  B）两套视觉系统，支持多种布局、主题色预设、低性能静态模式，无需构建工具，浏览器直接打开。适合需要快速制作演讲幻灯片、配图、公众号封面等场景的用户。
