usage:
  first_prompt_zh: 帮我基于这篇文章做一份瑞士风PPT，控制在7页左右，需要2-3张配图。
  first_prompt_en: Help me create a Swiss-style PPT based on this article, around 7 pages, with 2-3 illustrations.
name_en: guizang-ppt-skill
description_en: 'A web-based PPT skill adapted for AI Agent environments like Claude Code / Codex, used to generate single-file
  HTML horizontal-flip PPT, PPT illustrations, and multi-platform covers. Built-in two visual systems: electronic magazine
  style (Style A) and Swiss International style (Style B). Supports multiple layouts, theme color presets, low-performance
  static mode. No build tools required, open directly in browser. Suitable for users who need to quickly create presentation
  slides, illustrations, WeChat public account covers, etc.'
