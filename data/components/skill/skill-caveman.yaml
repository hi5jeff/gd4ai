description_zh: Caveman 是一个让 AI 编码代理（如 Claude Code、Cursor、Windsurf 等）用原始人风格回答的 skill/plugin。它通过精简输出语言，在保持代码、命令和错误信息完全准确的前提下，平均减少
  65% 的输出 token，从而大幅节省 API 费用并提升响应速度。适合所有使用 AI 编码助手并希望降低 token 消耗的开发者。
