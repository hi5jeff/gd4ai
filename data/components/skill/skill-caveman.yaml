name_en: caveman
description_en: Caveman is a skill/plugin that makes AI coding agents (such as Claude Code, Cursor, Windsurf, etc.) respond
  in a caveman style. By streamlining output language while keeping code, commands, and error messages completely accurate,
  it reduces output tokens by an average of 65%, significantly saving API costs and improving response speed. Suitable for
  all developers using AI coding assistants who want to reduce token consumption.
