id: skill-graphify
type: skill
name: graphify
description_zh: Graphify 是一个 AI 编码助手技能，支持 Claude Code、Codex、Cursor 等多种工具。它能将任意文件夹中的代码、SQL 模式、脚本、文档、图片或视频转化为可查询的知识图谱，让开发者通过自然语言查询项目结构、数据库
  schema 和基础设施，替代传统的 grep 文件搜索。适合需要快速理解大型项目或跨模块关联的开发者。
