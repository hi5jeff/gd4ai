  first_prompt_en: Enter /graphify in the AI coding assistant to start mapping the project knowledge graph.
name_en: graphify
description_en: Graphify is an AI coding assistant skill that supports multiple tools such as Claude Code, Codex, and Cursor.
  It can convert code, SQL schemas, scripts, documents, images, or videos in any folder into a queryable knowledge graph,
  allowing developers to query project structure, database schemas, and infrastructure using natural language, replacing traditional
  grep file searches. Suitable for developers who need to quickly understand large projects or cross-module dependencies.
