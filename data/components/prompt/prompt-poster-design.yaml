usage:
  first_prompt_zh: '【模板】minimalist promotional poster design, [主题物品] as hero element, bold color blocking, large negative
    space at top for headline text, professional graphic design, flat illustration style --ar 3:4

    【要点】留白给文字(negative space for text)、指定风格(flat/3D/photo)、指定配色(brand color: #FF6B35)

    '
  verify_zh: 出图上方应有干净留白可放标题文字
  first_prompt_en: '[Template] minimalist promotional poster design, [subject item] as hero element, bold color blocking,
    large negative space at top for headline text, professional graphic design, flat illustration style --ar 3:4

    [Key points] Leave whitespace for text (negative space for text), specify style (flat/3D/photo), specify color scheme
    (brand color: #FF6B35)

    '
  verify_en: The generated image should have clean whitespace at the top for placing title text.
